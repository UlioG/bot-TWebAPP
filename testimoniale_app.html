        <div class="form-group">
            <label class="form-label">Testo</label>
            <textarea class="form-input" id="modal-note-text" rows="3" placeholder="Testo della nota..."></textarea>
        </div>
        <div class="px-16 mt-8">
            <button class="btn btn-primary" id="modal-save-note">Salva Nota</button>
        </div>`;
        UI.showModal(html);

        let selectedType = 'generic';
        document.querySelectorAll('.note-type-btn').forEach((btn) => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.note-type-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedType = btn.dataset.value;
            });
        });

        document.getElementById('modal-save-note').addEventListener('click', async () => {
            const text = document.getElementById('modal-note-text').value.trim();
            if (!text) { UI.toast('Inserisci il testo'); return; }

            await Events.dispatch('add_global_note', this.sopId, {
                note_type: selectedType,
                note_text: text
            });
            UI.hideModal();
            UI.toast('Nota aggiunta');
            this.render(document.getElementById('app-content'), [this.sopId]);
        });
    },

    /**
     * Esporta dati come file JSON scaricabile
     */
    async exportJSON(sop) {
        const events = await DB.getEventsBySopralluogo(sop.id);
        const exportData = {
            sopralluogo: sop,
            events: events,
            exported_at: new Date().toISOString()
        };

        const json = JSON.stringify(exportData, null, 2);
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);

        const a = document.createElement('a');
        a.href = url;
        a.download = `testimoniale_${sop.building_code}_${sop.subalterno || ''}_${Date.now()}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        UI.toast('JSON esportato');
    }
};


/**
 * archive.js - Archivio sopralluoghi completati
 */
const ArchiveView = {
    async render(container) {
        UI.setTitle('Archivio');

        const sopralluoghi = await DB.getAllSopralluoghi();

        let html = '';

        // Filtro
        html += `
            <div class="form-group">
                <input class="form-input" type="text" id="archive-search" placeholder="Cerca per codice fabbricato...">
            </div>
        `;

        if (sopralluoghi.length === 0) {
            html += UI.emptyState('📦', 'Archivio vuoto', 'I sopralluoghi completati appariranno qui');
        } else {
            html += '<div id="archive-list">';
            html += this.renderList(sopralluoghi);
            html += '</div>';
        }

        container.innerHTML = html;

        // Filtro ricerca
        document.getElementById('archive-search')?.addEventListener('input', (e) => {
            const query = e.target.value.trim().toUpperCase();
            const filtered = query
                ? sopralluoghi.filter((s) =>
                    (s.building_code || '').toUpperCase().includes(query) ||
                    (s.unit_name || '').toUpperCase().includes(query) ||
                    (s.building_address || '').toUpperCase().includes(query)
                )
                : sopralluoghi;

            document.getElementById('archive-list').innerHTML = this.renderList(filtered);
            this.bindListEvents();
        });

        this.bindListEvents();
    },

    renderList(sopralluoghi) {
        if (sopralluoghi.length === 0) {
            return '<div class="text-center text-hint py-12">Nessun risultato</div>';
        }

        let cells = '';
        for (const sop of sopralluoghi) {
            const roomCount = Object.keys(sop.rooms || {}).length;
            const date = sop.created_at ? new Date(sop.created_at).toLocaleDateString('it-IT') : '-';
            const syncIcon = sop.synced ? '☁️' : '📱';

            cells += UI.cell({
                icon: syncIcon,
                title: `${sop.building_code} - ${sop.unit_name || sop.unit_type || ''}`,
                subtitle: `${sop.floor || ''} | ${roomCount} vani | ${date}`,
                dataId: sop.id
            });
        }

        return `<div class="section"><div class="section-body">${cells}</div></div>`;
    },

    bindListEvents() {
        document.querySelectorAll('#archive-list .cell[data-id]').forEach((cell) => {
            cell.addEventListener('click', () => {
                const id = cell.dataset.id;
                App.navigate(`review/${id}`);
            });
        });
    }
};


/**
 * app.js - Router SPA e inizializzazione Telegram WebApp
 */
const App = {
    currentView: null,
    currentParams: {},

    // Mappa route → modulo vista
    routes: {
        'home': HomeView,
        'setup': SetupView,
        'anagrafica': AnagraficaView,
        'rooms': RoomsView,
        'room': RoomsView,       // sub-route per singolo vano
        'wizard': WizardView,
        'review': ReviewView,
        'archive': ArchiveView
    },

    /**
     * Inizializzazione app
     */
    async init() {
        // Init Telegram WebApp
        if (window.Telegram && Telegram.WebApp) {
            Telegram.WebApp.ready();
            Telegram.WebApp.expand();

            // Fullscreen (Telegram WebApp SDK 8.0+)
            try {
                if (Telegram.WebApp.requestFullscreen) {
                    Telegram.WebApp.requestFullscreen();
                }
            } catch (e) { /* older SDK */ }

            // Imposta colore header
            try {
                Telegram.WebApp.setHeaderColor('secondary_bg_color');
            } catch (e) { /* older SDK */ }
        }

        // Init IndexedDB
        await DB.open();

        // Init sync indicator
        Sync.init();

                // Router: ascolta hash changes
        window.addEventListener('hashchange', () => this.handleRoute());

        // Gestisci tasto back di Telegram
        if (window.Telegram && Telegram.WebApp) {
            Telegram.WebApp.BackButton.onClick(() => {
                if (window.history.length > 1) {
                    window.history.back();
                } else {
                    this.navigate('home');
                }
            });
        }

        // Prima navigazione
        if (!location.hash || location.hash === '#') {
            this.navigate('home');
        } else {
            this.handleRoute();
        }
    },

    /**
     * Naviga a una route
     */
    navigate(route, replace = false) {
        if (replace) {
            location.replace('#' + route);
        } else {
            location.hash = route;
        }
    },

    /**
     * Gestisci cambio route
     */
    handleRoute() {
        const hash = location.hash.slice(1) || 'home';
        const parts = hash.split('/');
        const viewName = parts[0];
        const params = parts.slice(1);

        // Trova il modulo vista
        const ViewModule = this.routes[viewName];
        if (!ViewModule) {
            this.navigate('home', true);
            return;
        }

        // Gestisci back button Telegram
        if (window.Telegram && Telegram.WebApp) {
            if (viewName === 'home') {
                Telegram.WebApp.BackButton.hide();
            } else {
                Telegram.WebApp.BackButton.show();
            }
        }

        // Gestisci back button HTML
        UI.showBack(viewName !== 'home');

        this.currentView = viewName;
        this.currentParams = params;

        // Render vista
        const content = document.getElementById('app-content');
        content.scrollTop = 0;

        ViewModule.render(content, params);
    },

    /**
     * Ottieni il sopralluogo corrente dall'URL
     */
    getSopralluogoId() {
        return this.currentParams[0] || null;
    }
};

// ========== AVVIO ==========
document.addEventListener('DOMContentLoaded', () => {
    App.init().catch((e) => console.error('App init error:', e));
});

    </script>
