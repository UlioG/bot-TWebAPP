        html += '<div id="owner-fields"></div>';

        // Presenti - Metro C Tecnico
        html += `
            <div class="section">
                <div class="section-header">PRESENTI AL SOPRALLUOGO</div>
                <div class="section-body">
                    ${this.formField('metro_tech', 'Tecnico Metro C (Società)', sop.attendees?.metro_tech)}
                </div>
            </div>
        `;

        // Collaboratori Metro C (multipli)
        const collaborators = Array.isArray(sop.attendees?.metro_coll) ? sop.attendees.metro_coll : [];
        html += `
            <div class="section">
                <div class="section-header">COLLABORATORI METRO C</div>
                <div class="section-body" id="collaborators-list">
        `;
        for (let i = 0; i < collaborators.length; i++) {
            html += `<div class="form-group" style="display:flex; gap:8px; align-items:center;">
                <input class="form-input collaborator-input" type="text" data-coll-index="${i}" value="${collaborators[i]}" placeholder="Nome collaboratore ${i + 1}">
                <button class="btn-choice coll-remove" data-coll-index="${i}" style="color:var(--destructive); min-width:40px; padding:8px;">×</button>
            </div>`;
        }
        html += `</div>
            <div class="px-16 py-4">
                <button class="btn btn-secondary" id="btn-add-coll">+ Aggiungi Collaboratore</button>
            </div>
        </div>
        `;

        // Roma Metropolitane
        html += `
            <div class="section">
                <div class="section-body">
                    ${this.formField('rm', 'Roma Metropolitane', sop.attendees?.rm)}
                </div>
            </div>
        `;

        // Bottone procedi
        html += `
            <div class="px-16 py-12">
                <button class="btn btn-primary" id="btn-proceed">Procedi ai Vani</button>
            </div>
            <div style="height: 32px;"></div>
        `;

        container.innerHTML = html;

        // Render campi proprietario
        this.renderOwnerFields(sop);

        // Bind events
        this.bindEvents(sop);
    },

    formField(id, label, value) {
        return `
            <div class="form-group">
                <label class="form-label" for="field-${id}">${label}</label>
                <input class="form-input" type="text" id="field-${id}" value="${value || ''}" placeholder="Inserisci ${label.toLowerCase()}">
            </div>
        `;
    },

    renderOwnerFields(sop) {
        const container = document.getElementById('owner-fields');
        const type = sop.owner?.type || '';

        let html = '<div class="section"><div class="section-body">';
        if (type === 'persona') {
            html += this.formField('owner_name', 'Nome e Cognome', sop.owner?.name);
        } else if (type === 'societa') {
            html += this.formField('company_name', 'Ragione Sociale', sop.owner?.company_name);
            html += this.formField('company_admin', 'Amministratore', sop.owner?.company_admin);
        }
        html += '</div></div>';

        container.innerHTML = type ? html : '';
    },

    bindEvents(sop) {
        // Tipo proprietario
        document.querySelectorAll('[data-owner-type]').forEach((btn) => {
            btn.addEventListener('click', async () => {
                document.querySelectorAll('[data-owner-type]').forEach((b) => b.classList.remove('selected'));
                btn.classList.add('selected');

                const ownerType = btn.dataset.ownerType;
                const owner = { type: ownerType, name: '', company_name: '', company_admin: '' };
                await Events.dispatch('set_anagrafica', this.sopId, { owner });
                const updatedSop = await DB.getSopralluogo(this.sopId);
                this.renderOwnerFields(updatedSop);
            });
        });

        // Aggiungi collaboratore
        document.getElementById('btn-add-coll')?.addEventListener('click', async () => {
            const currentColl = this._getCollaborators();
            currentColl.push('');
            await Events.dispatch('set_anagrafica', this.sopId, {
                attendees: { metro_coll: currentColl }
            });
            const updatedSop = await DB.getSopralluogo(this.sopId);
            this.render(document.getElementById('app-content'), [this.sopId]);
        });

        // Rimuovi collaboratore
        document.querySelectorAll('.coll-remove').forEach((btn) => {
            btn.addEventListener('click', async () => {
                const idx = parseInt(btn.dataset.collIndex);
                const currentColl = this._getCollaborators();
                currentColl.splice(idx, 1);
                await Events.dispatch('set_anagrafica', this.sopId, {
                    attendees: { metro_coll: currentColl }
                });
                const updatedSop = await DB.getSopralluogo(this.sopId);
                this.render(document.getElementById('app-content'), [this.sopId]);
            });
        });

        // Procedi
        document.getElementById('btn-proceed').addEventListener('click', async () => {
            // Raccogli tutti i campi
            const owner = { type: sop.owner?.type || 'persona' };
            const nameEl = document.getElementById('field-owner_name');
            const companyEl = document.getElementById('field-company_name');
            const adminEl = document.getElementById('field-company_admin');

            if (nameEl) owner.name = nameEl.value.trim();
            if (companyEl) owner.company_name = companyEl.value.trim();
            if (adminEl) owner.company_admin = adminEl.value.trim();

            const attendees = {
                metro_tech: document.getElementById('field-metro_tech')?.value.trim() || '',
                metro_coll: this._getCollaborators(),
                rm: document.getElementById('field-rm')?.value.trim() || ''
            };

            await Events.dispatch('set_anagrafica', this.sopId, { owner, attendees });
            await Events.dispatch('complete_phase', this.sopId, { phase: 2 });

            UI.toast('Anagrafica salvata');
            App.navigate(`rooms/${this.sopId}`);
        });
    },

    /**
     * Legge i collaboratori dai campi input
     */
    _getCollaborators() {
        const inputs = document.querySelectorAll('.collaborator-input');
        const colls = [];
        inputs.forEach((input) => {
            const val = input.value.trim();
            if (val) colls.push(val);
        });
        return colls;
    }
};


/**
 * rooms.js - Fase 2: Gestione vani (lista, aggiunta, scheda vano)
 * Allineato al bot: edit/delete osservazioni, rinomina/elimina vano, elimina foto, tracking superfici
 */
const RoomsView = {
    sopId: null,

    async render(container, params) {
        this.sopId = params[0];
        if (!this.sopId) { App.navigate('home', true); return; }

        const roomParam = params[1] ? decodeURIComponent(params[1]) : null;

        const sop = await DB.getSopralluogo(this.sopId);
        if (!sop) { App.navigate('home', true); return; }

        if (roomParam && sop.rooms[roomParam]) {
            this.renderRoomCard(container, sop, roomParam);
        } else {
            this.renderRoomList(container, sop);
        }
    },

    // ========== LISTA VANI ==========
    async renderRoomList(container, sop) {
        UI.setTitle(`${sop.building_code} - Vani`);
        const rooms = sop.rooms || {};
        const roomNames = Object.keys(rooms);

        let html = '';

        // Header info
        html += `
            <div class="section">
                <div class="section-body">
                    <div class="cell" style="cursor:default">
                        <div class="cell-body">
                            <div class="cell-title">${sop.building_code} - ${sop.unit_name || sop.unit_type}</div>
                            <div class="cell-subtitle">${sop.floor} | ${sop.stair}</div>
                        </div>
                    </div>
                </div>
            </div>
        `;

        // Tabs fase
        html += `
            <div class="phase-tabs">
                <button class="phase-tab ${sop.phase === 2 ? 'active' : ''}" data-phase="2">Ricognizione</button>
                <button class="phase-tab ${sop.phase === 3 ? 'active' : ''}" data-phase="3">Analisi Difetti</button>
            </div>
        `;

        // Lista vani
        if (roomNames.length > 0) {
            let cells = '';
            for (const name of roomNames) {
                const room = rooms[name];
                const obsCount = (room.observations || []).length;
                const photoCount = (room.photos || []).length;
                const completedCount = (room.completed_surfaces || []).length;
                const totalSurfaces = CONFIG.REQUIRED_SURFACES.length;
                const statusIcon = room.status === 'accessible' ? '🟢' :
                                   room.status === 'non_accessibile' ? '🟠' :
                                   room.status === 'non_valutabile' ? '🔴' : '🟣';

                const surfaceInfo = completedCount > 0 ? ` | Sup: ${completedCount}/${totalSurfaces}` : '';

                cells += UI.cell({
                    icon: statusIcon,
                    title: name,
                    subtitle: `${room.finishes || 'Soffitto: -'} | Oss: ${obsCount} | Foto: ${photoCount}${surfaceInfo}`,
                    dataId: name
                });
            }
            html += UI.section('VANI', cells);
        } else {
            html += UI.emptyState('🏠', 'Nessun vano', 'Aggiungi il primo vano per iniziare');
        }

        // Bottoni
        html += `
            <div class="px-16 py-12 flex-col gap-8">
                <button class="btn btn-primary" id="btn-add-room">Aggiungi Vano</button>
                ${roomNames.length > 0 ? '<button class="btn btn-outline" id="btn-review">Riepilogo / Report</button>' : ''}
            </div>
            <div style="height: 32px;"></div>
        `;

        container.innerHTML = html;
        this.bindRoomListEvents(container, sop);
    },

    bindRoomListEvents(container, sop) {
        container.querySelectorAll('.cell[data-id]').forEach((cell) => {
            cell.addEventListener('click', () => {
                App.navigate(`rooms/${this.sopId}/${encodeURIComponent(cell.dataset.id)}`);
            });
        });

        container.querySelectorAll('.phase-tab').forEach((tab) => {
            tab.addEventListener('click', async () => {
                const phase = parseInt(tab.dataset.phase);
                await Events.dispatch('complete_phase', this.sopId, { phase });
                const updatedSop = await DB.getSopralluogo(this.sopId);
                this.renderRoomList(container, updatedSop);
            });
        });

        document.getElementById('btn-add-room')?.addEventListener('click', () => {
            this.showAddRoomModal(sop);
        });

        document.getElementById('btn-review')?.addEventListener('click', () => {
            App.navigate(`review/${this.sopId}`);
        });
    },

    showAddRoomModal(sop) {
        const existingRooms = Object.keys(sop.rooms || {});
        const nextNum = existingRooms.length + 1;

        let html = `
            <div class="modal-title">Aggiungi Vano</div>
            <div class="form-group">
                <label class="form-label">Numero Vano</label>
                <input class="form-input" type="text" id="modal-room-num" value="Vano ${nextNum}" placeholder="Es. Vano 1">
            </div>
            <div class="form-group">
                <label class="form-label">Nome Vano</label>
                <input class="form-input" type="text" id="modal-room-name" placeholder="Es. Cucina, Bagno, Ingresso">
            </div>
            <div class="section-header" style="padding-top:8px">SCEGLI TIPO</div>
        `;

        html += UI.buttonGrid(CONFIG.ROOM_TYPES, { cols: 3 });

        html += `
            <div class="px-16 mt-16">
                <button class="btn btn-primary" id="modal-confirm-room">Conferma</button>
            </div>
        `;

        UI.showModal(html);

        document.querySelectorAll('.modal-content .btn-choice').forEach((btn) => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.modal-content .btn-choice').forEach((b) => b.classList.remove('selected'));
                btn.classList.add('selected');
                const nameInput = document.getElementById('modal-room-name');
                const val = btn.dataset.value;
                nameInput.value = val.charAt(0).toUpperCase() + val.slice(1).toLowerCase();
            });
        });

        document.getElementById('modal-confirm-room').addEventListener('click', async () => {
            const roomNum = document.getElementById('modal-room-num').value.trim();
            const roomName = document.getElementById('modal-room-name').value.trim();

            if (!roomNum || !roomName) {
                UI.toast('Compila numero e nome vano');
                return;
            }

            const fullName = `${roomNum} - ${roomName}`;

            if (sop.rooms && sop.rooms[fullName]) {
                UI.toast('Vano già esistente');
                return;
            }

            await Events.dispatch('add_vano', this.sopId, {
                room_number: roomNum,
                room_name: roomName,
                full_name: fullName
            });

            UI.hideModal();
            UI.toast(`${fullName} aggiunto`);
            App.navigate(`rooms/${this.sopId}/${encodeURIComponent(fullName)}`);
        });
    },

    // ========== SCHEDA VANO ==========
    async renderRoomCard(container, sop, roomName) {
        const room = sop.rooms[roomName];
        UI.setTitle(roomName);

        let html = '';

        // Status e soffitto
        html += `
            <div class="section">
                <div class="section-body">
                    <div class="cell" style="cursor:default">
                        <div class="cell-body">
                            <div class="cell-title">Stato: ${UI.statusBadge(room.status)}</div>
                            <div class="cell-subtitle">Soffitto: ${room.finishes || 'Non selezionato'}</div>
                        </div>
                    </div>
                </div>
            </div>
        `;

        // Superfici mancanti
        html += UI.missingSurfaces(room.completed_surfaces);

        // Bottoni stato, soffitto, rinomina, elimina
        html += `
            <div class="px-16">
                <div class="btn-grid">
                    <button class="btn-choice" id="btn-set-status">Stato Vano</button>
                    <button class="btn-choice" id="btn-set-ceiling">Soffitto</button>
                </div>
                <div class="btn-grid mt-8">
                    <button class="btn-choice" id="btn-rename-room">Rinomina</button>
                    <button class="btn-choice" id="btn-delete-room" style="color:var(--destructive)">Elimina Vano</button>
                </div>
            </div>
        `;

        // Foto panoramiche
        html += `
            <div class="section">
                <div class="section-header">FOTO PANORAMICHE</div>
                <div class="section-body" id="room-photos-panoramic">
                    <div class="px-16 py-12 flex-col gap-8">
                        <button class="btn btn-secondary" id="btn-pano-camera">📷 Scatta Panoramica</button>
                        <button class="btn btn-secondary" id="btn-pano-gallery">🖼 Carica da Galleria</button>
                    </div>
                </div>
            </div>
        `;

        // Osservazioni
        const observations = room.observations || [];
        html += `<div class="section"><div class="section-header">OSSERVAZIONI (${observations.length})</div></div>`;

        if (observations.length > 0) {
            for (let i = 0; i < observations.length; i++) {
                html += UI.observationCard(observations[i], i, { showActions: true });
            }
        } else {
            html += `<div class="text-center text-hint py-12">Nessuna osservazione</div>`;
        }

        // Bottoni azioni
        html += `
            <div class="px-16 py-12 flex-col gap-8">
                <button class="btn btn-primary" id="btn-add-obs">Aggiungi Osservazione</button>
                <button class="btn btn-secondary" id="btn-back-rooms">Torna ai Vani</button>
            </div>
            <div style="height: 32px;"></div>
        `;

        container.innerHTML = html;

        // Carica foto panoramiche
        this.loadPanoramicPhotos(sop, roomName);

        // Events
        this.bindRoomCardEvents(sop, roomName);
    },

    async loadPanoramicPhotos(sop, roomName) {
        const allPhotos = await DB.getPhotosBySopralluogo(sop.id);
        const photos = allPhotos
            ? allPhotos.filter((p) => p.room_name === roomName && p.type === 'panoramica')
            : [];

        if (photos.length > 0) {
            let gridHtml = '<div class="photo-grid">';
            for (const photo of photos) {
                if (photo.thumbnail) {
                    const url = URL.createObjectURL(photo.thumbnail);
                    gridHtml += `<div class="photo-thumb" data-photo-id="${photo.id}">
                        <img src="${url}" alt="${photo.filename}">
                        <button class="photo-delete-btn" data-photo-id="${photo.id}" title="Elimina">×</button>
                    </div>`;
                }
            }
            gridHtml += '</div>';
            const photosContainer = document.getElementById('room-photos-panoramic');
            photosContainer.innerHTML = gridHtml + photosContainer.innerHTML;

            // Bind delete foto
            document.querySelectorAll('.photo-delete-btn').forEach((btn) => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const photoId = btn.dataset.photoId;
                    UI.confirmAction('Eliminare questa foto panoramica?', async () => {
                        await Events.dispatch('delete_photo', this.sopId, {
                            room_name: roomName,
                            photo_id: photoId
                        });
                        await DB.delete('photos', photoId);
                        UI.toast('Foto eliminata');
                        const updatedSop = await DB.getSopralluogo(this.sopId);
                        this.renderRoomCard(document.getElementById('app-content'), updatedSop, roomName);
                    });
                });
            });
        }
    },

    bindRoomCardEvents(sop, roomName) {
        // Stato vano
        document.getElementById('btn-set-status')?.addEventListener('click', () => {
            let html = '<div class="modal-title">Stato Vano</div>';
            html += UI.buttonGrid(
                CONFIG.ROOM_STATUSES.map((s) => ({
                    value: s,
                    label: CONFIG.ROOM_STATUS_LABELS[s]
                }))
            );
            UI.showModal(html);

            document.querySelectorAll('.modal-content .btn-choice').forEach((btn) => {
                btn.addEventListener('click', async () => {
                    await Events.dispatch('set_room_status', this.sopId, {
                        room_name: roomName,
                        status: btn.dataset.value
                    });
                    UI.hideModal();
                    UI.toast('Stato aggiornato');
                    const updatedSop = await DB.getSopralluogo(this.sopId);
                    this.renderRoomCard(document.getElementById('app-content'), updatedSop, roomName);
                });
            });
        });

        // Soffitto
        document.getElementById('btn-set-ceiling')?.addEventListener('click', () => {
            let html = '<div class="modal-title">Tipo Soffitto</div>';
            html += UI.buttonGrid(CONFIG.CEIL_TYPES);
            UI.showModal(html);

            document.querySelectorAll('.modal-content .btn-choice').forEach((btn) => {
                btn.addEventListener('click', async () => {
                    await Events.dispatch('set_room_finishes', this.sopId, {
                        room_name: roomName,
                        ceiling_type: btn.dataset.value
                    });
                    UI.hideModal();
                    UI.toast('Soffitto impostato');
                    const updatedSop = await DB.getSopralluogo(this.sopId);
                    this.renderRoomCard(document.getElementById('app-content'), updatedSop, roomName);
                });
            });
        });

        // Rinomina vano
        document.getElementById('btn-rename-room')?.addEventListener('click', () => {
            const room = sop.rooms[roomName];
            let html = `<div class="modal-title">Rinomina Vano</div>
            <div class="form-group">
                <label class="form-label">Numero Vano</label>
                <input class="form-input" type="text" id="modal-rename-num" value="${room.room_number || ''}" placeholder="Es. Vano 1">
            </div>
            <div class="form-group">
                <label class="form-label">Nome Vano</label>
                <input class="form-input" type="text" id="modal-rename-name" value="${room.room_name || ''}" placeholder="Es. Cucina">
            </div>
            <div class="px-16 mt-8">
                <button class="btn btn-primary" id="modal-rename-confirm">Rinomina</button>
            </div>`;
            UI.showModal(html);

            document.getElementById('modal-rename-confirm').addEventListener('click', async () => {
                const newNum = document.getElementById('modal-rename-num').value.trim();
                const newName = document.getElementById('modal-rename-name').value.trim();
                if (!newNum || !newName) { UI.toast('Compila entrambi i campi'); return; }
                const newFullName = `${newNum} - ${newName}`;
                if (newFullName === roomName) { UI.hideModal(); return; }
                if (sop.rooms[newFullName]) { UI.toast('Nome già in uso'); return; }

                await Events.dispatch('rename_vano', this.sopId, {
                    old_name: roomName,
                    new_room_number: newNum,
                    new_room_name: newName,
                    new_full_name: newFullName
                });
                UI.hideModal();
                UI.toast('Vano rinominato');
                App.navigate(`rooms/${this.sopId}/${encodeURIComponent(newFullName)}`);
            });
        });

        // Elimina vano
        document.getElementById('btn-delete-room')?.addEventListener('click', () => {
            UI.confirmAction(`Eliminare "${roomName}" e tutte le sue osservazioni?`, async () => {
                await Events.dispatch('delete_vano', this.sopId, { room_name: roomName });
                UI.toast('Vano eliminato');
                App.navigate(`rooms/${this.sopId}`);
            });
        });

        // Foto panoramica
        const savePanoramica = async (result) => {
            if (result) {
                const { id, filename } = await Photos.save(this.sopId, roomName, 'panoramica', result.blob, result.thumbnail);
                await Events.dispatch('add_photo', this.sopId, {
                    room_name: roomName,
                    photo_id: id,
                    type: 'panoramica',
                    filename: filename
                });
                UI.toast('Foto panoramica aggiunta');
                const updatedSop = await DB.getSopralluogo(this.sopId);
                this.renderRoomCard(document.getElementById('app-content'), updatedSop, roomName);
            }
        };

        document.getElementById('btn-pano-camera')?.addEventListener('click', async () => {
            savePanoramica(await Photos.takePhoto());
        });

        document.getElementById('btn-pano-gallery')?.addEventListener('click', async () => {
            savePanoramica(await Photos.fromGallery());
        });

        // Aggiungi osservazione
        document.getElementById('btn-add-obs')?.addEventListener('click', () => {
            App.navigate(`wizard/${this.sopId}/${encodeURIComponent(roomName)}`);
        });

        // Torna ai vani
        document.getElementById('btn-back-rooms')?.addEventListener('click', () => {
            App.navigate(`rooms/${this.sopId}`);
        });

        // Delete osservazione
        document.querySelectorAll('.obs-btn-delete').forEach((btn) => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const idx = parseInt(btn.dataset.obsIndex);
                UI.confirmAction('Eliminare questa osservazione?', async () => {
                    await Events.dispatch('delete_observation', this.sopId, {
                        room_name: roomName,
                        observation_index: idx
                    });
                    UI.toast('Osservazione eliminata');
                    const updatedSop = await DB.getSopralluogo(this.sopId);
                    this.renderRoomCard(document.getElementById('app-content'), updatedSop, roomName);
                });
            });
        });
    }
};


/**
 * wizard.js - Wizard Osservazione completo (allineato al bot)
 *
 * Flow per elemento:
 * Pareti:         element → wall → counterwall → pre_check → position → phenomenon → specifics → details → prosecution → notes → photo → confirm
 * Soffitto/Pav:   element → pre_check → position → phenomenon → specifics → details → prosecution → notes → photo → confirm
 * Balcone:        element → balcone_sub → [counterwall] → pre_check → position → phenomenon → specifics → details → prosecution → notes → photo → confirm
 * Elemento/Varco: element → infisso_type → infisso_location → infisso_wall → infisso_which → infisso_sub_pos → pre_check → phenomenon → specifics → details → prosecution → notes → photo → confirm
 */
const WizardView = {
    sopId: null,
    roomName: null,
    step: 'element',
    obs: {},

    async render(container, params) {
        this.sopId = params[0];
        this.roomName = params[1] ? decodeURIComponent(params[1]) : null;

        if (!this.sopId || !this.roomName) {
            App.navigate('home', true);
            return;
        }

        // Reset wizard state
        this.step = 'element';
        this.obs = {
            element: null,
            wall: null,
            has_counterwall: false,
            balcone_sub: null,
            positions_selected: [],
            position: null,
            phenomenon: null,
            specifics: [],
            attributes: [],
            prosecutions: [],
            notes: '',
            photo_id: null,
            non_visibile: false,
            parz_ingombra: false,
            // Elemento/Varco
            infisso_type: null,
            infisso_location: null,
            infisso_wall: null,
            infisso_which: null,
            infisso_sub_pos: null
        };

        this.renderStep(container);
    },

    renderStep(container) {
        if (!container) container = document.getElementById('app-content');

        switch (this.step) {
            case 'element': this.renderElement(container); break;
            case 'wall': this.renderWall(container); break;
            case 'counterwall': this.renderCounterwall(container); break;
            case 'balcone_sub': this.renderBalconeSub(container); break;
            case 'pre_check': this.renderPreCheck(container); break;
            case 'infisso_type': this.renderInfissoType(container); break;
            case 'infisso_location': this.renderInfissoLocation(container); break;
            case 'infisso_wall': this.renderInfissoWall(container); break;
            case 'infisso_which': this.renderInfissoWhich(container); break;
            case 'infisso_sub_pos': this.renderInfissoSubPos(container); break;
            case 'position': this.renderPosition(container); break;
            case 'position_elemento': this.renderPositionElemento(container); break;
            case 'phenomenon': this.renderPhenomenon(container); break;
            case 'specifics': this.renderSpecifics(container); break;
            case 'details': this.renderDetails(container); break;
            case 'prosecution': this.renderProsecution(container); break;
            case 'prosecution_target': this.renderProsecutionTarget(container); break;
            case 'notes': this.renderNotes(container); break;
            case 'photo': this.renderPhoto(container); break;
            case 'confirm': this.renderConfirm(container); break;
        }
    },

    /**
     * Torna allo step precedente in base al flow dell'elemento corrente
     */
    goBack() {
        const elem = this.obs.element;
        const prevMap = {
            'wall': 'element',
            'counterwall': 'wall',
            'balcone_sub': 'element',
            'pre_check': this._preCheckBackTarget(),
            'infisso_type': 'element',
            'infisso_location': 'infisso_type',
            'infisso_wall': 'infisso_location',
            'infisso_which': 'infisso_wall',
            'infisso_sub_pos': 'infisso_which',
            'position': 'pre_check',
            'position_elemento': 'position',
            'phenomenon': elem === 'Elemento/Varco' ? 'pre_check' : 'position',
            'specifics': 'phenomenon',
            'details': 'specifics',
            'prosecution': 'details',
            'prosecution_target': 'prosecution',
            'notes': 'prosecution',
            'photo': 'notes',
            'confirm': 'photo'
        };

        const prev = prevMap[this.step];
        if (prev) {
            this.step = prev;
            this.renderStep();
        } else {
            App.navigate(`rooms/${this.sopId}/${encodeURIComponent(this.roomName)}`);
        }
    },

    _preCheckBackTarget() {
        const elem = this.obs.element;
        if (elem === 'Pareti') return 'counterwall';
        if (elem === 'Balcone') {
            return this.obs.balcone_sub && this.obs.balcone_sub.startsWith('Parete') ? 'counterwall' : 'balcone_sub';
        }
        if (elem === 'Elemento/Varco') return 'infisso_sub_pos';
        return 'element';
    },

    _wizardHeader(title, subtitle) {
        return `<div class="wizard-header">
            <div class="wizard-title">${title}</div>
            <div class="wizard-subtitle">${subtitle}</div>
        </div>`;
    },

    _backButton() {
        return `<div class="px-16 mt-8"><button class="btn btn-secondary" id="btn-wiz-back">Indietro</button></div>`;
    },

    _bindBack() {
        document.getElementById('btn-wiz-back')?.addEventListener('click', () => this.goBack());
    },

    // ========== STEP: ELEMENTO ==========
    renderElement(container) {
        UI.setTitle('Elemento');
        let html = this._wizardHeader(this.roomName, "Seleziona l'elemento da ispezionare");
        html += UI.buttonGrid(CONFIG.ELEMENTS);
        container.innerHTML = html;

        container.querySelectorAll('.btn-choice').forEach((btn) => {
            btn.addEventListener('click', () => {
                this.obs.element = btn.dataset.value;

                if (this.obs.element === 'Pareti') {
                    this.step = 'wall';
                } else if (this.obs.element === 'Balcone') {
                    this.step = 'balcone_sub';
                } else if (this.obs.element === 'Elemento/Varco') {
                    this.step = 'infisso_type';
                } else {
                    this.step = 'pre_check';
                }
                this.renderStep();
            });
        });
    },

    // ========== STEP: PARETE A/B/C/D ==========
    renderWall(container) {
        UI.setTitle('Parete');
        let html = this._wizardHeader('Pareti', 'Seleziona la parete');
        html += UI.buttonGrid(CONFIG.WALL_LABELS);
        html += this._backButton();
        container.innerHTML = html;

        container.querySelectorAll('.btn-choice').forEach((btn) => {
            btn.addEventListener('click', () => {
                this.obs.wall = btn.dataset.value;
                this.step = 'counterwall';
                this.renderStep();
            });
        });
        this._bindBack();
    },

    // ========== STEP: CONTROPARETE ==========
    renderCounterwall(container) {
        const label = this.obs.wall || this.obs.balcone_sub || 'Parete';
        UI.setTitle('Controparete');
        let html = this._wizardHeader(label, 'Ha una controparete?');
        html += `<div class="btn-grid px-16">
            <button class="btn-choice" data-value="true">Si</button>
            <button class="btn-choice" data-value="false">No</button>
        </div>`;
        html += this._backButton();
        container.innerHTML = html;

        container.querySelectorAll('.btn-choice').forEach((btn) => {
            btn.addEventListener('click', () => {
                this.obs.has_counterwall = btn.dataset.value === 'true';
                this.step = 'pre_check';
                this.renderStep();
            });
        });
        this._bindBack();
    },

    // ========== STEP: BALCONE SUB-ELEMENTO ==========
    renderBalconeSub(container) {
        UI.setTitle('Elemento Balcone');
        let html = this._wizardHeader('Balcone', 'Seleziona elemento del balcone');
        html += UI.buttonGrid(CONFIG.BALCONE_SUB_ELEMENTS, { cols: 2 });
        html += this._backButton();
        container.innerHTML = html;

        container.querySelectorAll('.btn-choice').forEach((btn) => {
            btn.addEventListener('click', () => {
                this.obs.balcone_sub = btn.dataset.value;
                // Se è una parete, chiedi controparete
                if (this.obs.balcone_sub.startsWith('Parete')) {
                    this.step = 'counterwall';
                } else {
                    this.step = 'pre_check';
                }
                this.renderStep();
            });
        });
        this._bindBack();
    },

    // ========== STEP: PRE-CHECK (5 opzioni come il bot) ==========
    renderPreCheck(container) {
        const label = this._getCurrentLabel();
        UI.setTitle('Pre-Check');
        let html = this._wizardHeader(label, 'Controllo preliminare');

        html += '<div class="px-16 flex-col gap-8">';
        for (const opt of CONFIG.PRE_CHECK) {
            html += `<button class="btn btn-outline" data-value="${opt.value}" style="text-align:left; justify-content:flex-start;">
                <span style="margin-right:8px">${opt.icon}</span> ${opt.label}
            </button>`;
        }
        html += '</div>';
        html += this._backButton();
        container.innerHTML = html;

        container.querySelectorAll('[data-value]').forEach((btn) => {
            if (btn.id === 'btn-wiz-back') return;
            btn.addEventListener('click', async () => {
                const value = btn.dataset.value;

                if (value === 'NDR') {
                    await Events.dispatch('set_room_ndr', this.sopId, {
                        room_name: this.roomName,
                        element: this.obs.element,
                        wall: this.obs.wall,
                        balcone_sub: this.obs.balcone_sub,
                        has_counterwall: this.obs.has_counterwall
                    });
                    UI.toast('NDR registrato');
                    App.navigate(`rooms/${this.sopId}/${encodeURIComponent(this.roomName)}`);
                } else if (value === 'NON_VISIBILE') {
                    this.obs.non_visibile = true;
                    await Events.dispatch('set_room_non_visibile', this.sopId, {
                        room_name: this.roomName,
                        element: this.obs.element,
                        wall: this.obs.wall,
                        balcone_sub: this.obs.balcone_sub,
                        has_counterwall: this.obs.has_counterwall
                    });
                    UI.toast('Non Visibile registrato');
                    App.navigate(`rooms/${this.sopId}/${encodeURIComponent(this.roomName)}`);
                } else if (value === 'INGOMBRA') {
                    await Events.dispatch('set_room_ingombra', this.sopId, {
                        room_name: this.roomName,
                        element: this.obs.element,
                        wall: this.obs.wall,
                        balcone_sub: this.obs.balcone_sub,
                        has_counterwall: this.obs.has_counterwall
                    });
                    UI.toast('Ingombra registrato');
                    App.navigate(`rooms/${this.sopId}/${encodeURIComponent(this.roomName)}`);
                } else if (value === 'PARZIALE') {
                    // Parzialmente ingombra: registra nota ma prosegue con posizione/fenomeno
                    this.obs.parz_ingombra = true;
                    this.obs.notes = 'Parzialmente Ingombra';
                    if (this.obs.element === 'Elemento/Varco') {
                        this.step = 'phenomenon';
                    } else {
                        this.step = 'position';
                    }
                    this.renderStep();
                } else {
                    // PROCEDI
                    if (this.obs.element === 'Elemento/Varco') {
                        this.step = 'phenomenon';
                    } else {
                        this.step = 'position';
                    }
                    this.renderStep();
                }
            });
        });
        this._bindBack();
    },

    // ========== INFISSO STEPS ==========
    renderInfissoType(container) {
        UI.setTitle('Tipo Elemento/Varco');
        let html = this._wizardHeader('Elemento/Varco', 'Seleziona il tipo');
        html += UI.buttonGrid(CONFIG.VARCO_SUB_ELEMENTS, { cols: 2 });
        html += this._backButton();
        container.innerHTML = html;

        container.querySelectorAll('.btn-choice').forEach((btn) => {
            btn.addEventListener('click', () => {
                this.obs.infisso_type = btn.dataset.value;
                this.step = 'infisso_location';
                this.renderStep();
            });
        });
        this._bindBack();
    },

    renderInfissoLocation(container) {
        UI.setTitle('Posizione Elemento');
        let html = this._wizardHeader(this.obs.infisso_type, 'Dove si trova?');
        html += UI.buttonGrid(CONFIG.VARCO_LOCATIONS, { cols: 2 });
        html += this._backButton();
        container.innerHTML = html;

        container.querySelectorAll('.btn-choice').forEach((btn) => {
            btn.addEventListener('click', () => {
                this.obs.infisso_location = btn.dataset.value;
                // Se è su una parete, chiedi quale
                if (this.obs.infisso_location.startsWith('Parete')) {
                    this.obs.infisso_wall = this.obs.infisso_location;
                    this.step = 'infisso_which';
                } else {
                    this.obs.infisso_wall = null;
                    this.step = 'infisso_which';
                }
                this.renderStep();
            });
        });
        this._bindBack();
    },

    renderInfissoWall(container) {
        UI.setTitle('Parete Infisso');
        let html = this._wizardHeader(this.obs.infisso_type, 'Su quale parete?');
        html += UI.buttonGrid(CONFIG.WALL_LABELS);
        html += this._backButton();
        container.innerHTML = html;

        container.querySelectorAll('.btn-choice').forEach((btn) => {
            btn.addEventListener('click', () => {
                this.obs.infisso_wall = btn.dataset.value;
                this.step = 'infisso_which';
                this.renderStep();
            });
        });
        this._bindBack();
    },

    renderInfissoWhich(container) {
        UI.setTitle('Quale');
        const locLabel = this.obs.infisso_wall || this.obs.infisso_location || '';
        let html = this._wizardHeader(`${this.obs.infisso_type} - ${locLabel}`, 'Identifica quale (es. 1° da SX)');
        html += `<div class="form-group px-16">
            <input class="form-input" type="text" id="infisso-which-input" placeholder="Es. 1 da SX, 2 da DX, Centrale, unico">
        </div>
        <div class="px-16"><button class="btn btn-primary" id="btn-infisso-which-ok">Avanti</button></div>`;
        html += this._backButton();
        container.innerHTML = html;

        const input = document.getElementById('infisso-which-input');
        setTimeout(() => input.focus(), 100);
        input.addEventListener('keydown', (e) => { if (e.key === 'Enter') document.getElementById('btn-infisso-which-ok').click(); });

        document.getElementById('btn-infisso-which-ok').addEventListener('click', () => {
            const val = input.value.trim();
            if (!val) { UI.toast('Inserisci un valore'); return; }
            this.obs.infisso_which = val;
            this.step = 'infisso_sub_pos';
            this.renderStep();
        });
        this._bindBack();
    },

    renderInfissoSubPos(container) {
        UI.setTitle('Dettaglio Infisso');
        let html = this._wizardHeader(`${this.obs.infisso_type} ${this.obs.infisso_which}`, 'Parte specifica');
        html += UI.buttonGrid(CONFIG.VARCO_DEFECT_POSITIONS, { cols: 3 });
        html += this._backButton();
        container.innerHTML = html;

        container.querySelectorAll('.btn-choice').forEach((btn) => {
            btn.addEventListener('click', () => {
                this.obs.infisso_sub_pos = btn.dataset.value;
                this.step = 'pre_check';
                this.renderStep();
            });
        });
        this._bindBack();
    },

    // ========== STEP: POSIZIONE (multi-select come il bot) ==========
    renderPosition(container) {
        const label = this._getCurrentLabel();
        UI.setTitle('Posizione');

        const positions = CONFIG.getPositions(this.obs.element);
        const selected = this.obs.positions_selected || [];

        let html = this._wizardHeader(label, 'Seleziona posizione (multipla, poi Procedi)');

        if (selected.length > 0) {
            html += `<div class="px-16 mb-8"><span class="text-hint">Selezionati: <strong style="color:var(--text)">${selected.join(', ')}</strong></span></div>`;
        }

        // Chip list con toggle
        html += '<div class="chip-list px-16">';
        for (const p of positions) {
            const isSel = selected.includes(p);
            html += `<button class="menu-chip check ${isSel ? 'selected' : ''}" data-value="${p}">${isSel ? '✅ ' : ''}${p}</button>`;
        }
        html += '</div>';

        html += `<div class="px-16 py-12 flex-col gap-8">
            <button class="btn btn-primary" id="btn-pos-proceed">Procedi</button>
            <button class="btn btn-outline" id="btn-pos-manual">Scrivi a mano</button>
        </div>`;
        html += this._backButton();
        container.innerHTML = html;

        // Toggle chips
        container.querySelectorAll('.menu-chip.check').forEach((chip) => {
            chip.addEventListener('click', () => {
                const val = chip.dataset.value;
                const idx = this.obs.positions_selected.indexOf(val);
                if (idx >= 0) {
                    this.obs.positions_selected.splice(idx, 1);
                } else {
                    this.obs.positions_selected.push(val);
                }
                // Re-render per aggiornare stato
                this.renderStep();
            });
        });

        // Procedi
        document.getElementById('btn-pos-proceed').addEventListener('click', () => {
            if (this.obs.positions_selected.length === 0) {
                UI.toast('Seleziona almeno una posizione');
                return;
            }
            this.obs.position = this.obs.positions_selected.join(', ');
            // Controlla se "presso elemento" è selezionato → chiedi testo libero
            if (this.obs.positions_selected.includes('presso elemento')) {
                this.step = 'position_elemento';
            } else {
                this.step = 'phenomenon';
            }
            this.renderStep();
        });

        // Manuale
        document.getElementById('btn-pos-manual').addEventListener('click', () => {
            this.step = 'position_elemento';
            this.renderStep();
        });

        this._bindBack();
    },

    // ========== STEP: POSIZIONE ELEMENTO (testo libero) ==========
    renderPositionElemento(container) {
        UI.setTitle('Specifica Elemento');
        let html = this._wizardHeader('Presso Elemento', 'Specifica l\'elemento (es. porta, finestra 1 da SX, pilastro)');
        html += `<div class="form-group px-16">
            <input class="form-input" type="text" id="pos-elem-input" placeholder="Es. porta, finestra 1 da SX, pilastro">
        </div>
        <div class="px-16"><button class="btn btn-primary" id="btn-pos-elem-ok">Avanti</button></div>`;
        html += this._backButton();
        container.innerHTML = html;

        const input = document.getElementById('pos-elem-input');
        setTimeout(() => input.focus(), 100);
        input.addEventListener('keydown', (e) => { if (e.key === 'Enter') document.getElementById('btn-pos-elem-ok').click(); });

        document.getElementById('btn-pos-elem-ok').addEventListener('click', () => {
            const val = input.value.trim();
            if (val) {
                // Sostituisci o aggiungi "presso elemento" con la specifica
                const filtered = this.obs.positions_selected.filter(p => p !== 'presso elemento');
                filtered.push(`presso ${val}`);
                this.obs.positions_selected = filtered;
                this.obs.position = filtered.join(', ');
            } else if (this.obs.positions_selected.length === 0) {
                // Input manuale completo
                this.obs.position = val;
            }
            this.step = 'phenomenon';
            this.renderStep();
        });
        this._bindBack();
    },

    // ========== STEP: FENOMENO (singola selezione) ==========
    renderPhenomenon(container) {
        const label = this._getCurrentLabel();
        UI.setTitle('Fenomeno');

        const phenomena = CONFIG.getPhenomena(this.obs.element);
        const posStr = this.obs.position || '?';

        let html = this._wizardHeader(label, `Posizione: ${posStr}`);
        html += `<div class="px-16 mb-8"><span class="text-hint">Seleziona il difetto</span></div>`;
        html += UI.chipList(phenomena);

        // NDR disponibile se parz. ingombra o non visibile
        if (this.obs.parz_ingombra || this.obs.non_visibile) {
            html += `<div class="px-16 mt-8"><button class="menu-chip" data-value="NDR" style="background:var(--btn);color:var(--btn-text)">🟢 NDR (Nulla da Rilevare)</button></div>`;
        }
        html += `<div class="px-16 mt-8"><button class="btn btn-outline" id="btn-phen-skip">Procedi (salta difetto)</button></div>`;
        html += this._backButton();
        container.innerHTML = html;

        container.querySelectorAll('.menu-chip').forEach((chip) => {
            chip.addEventListener('click', () => {
                this.obs.phenomenon = chip.dataset.value;
                if (this.obs.phenomenon === 'NDR') {
                    // NDR: vai a note
                    this.step = 'notes';
                } else {
                    this.step = 'specifics';
                }
                this.renderStep();
            });
        });

        document.getElementById('btn-phen-skip')?.addEventListener('click', () => {
            this.obs.phenomenon = '';
            this.step = 'notes';
            this.renderStep();
        });

        this._bindBack();
    },

    // ========== STEP: SPECIFICHE DIFETTO (multi-select, nuovo step come il bot) ==========
    renderSpecifics(container) {
        UI.setTitle('Specifiche');
        const selected = this.obs.specifics || [];

        let html = this._wizardHeader(this.obs.phenomenon || '?', 'Seleziona specifiche (multipla, poi Procedi)');

        if (selected.length > 0) {
            html += `<div class="px-16 mb-8"><span class="text-hint">Selezionati: <strong style="color:var(--text)">${selected.join(', ')}</strong></span></div>`;
        }

        html += '<div class="chip-list px-16">';
        for (const s of CONFIG.DEFECT_SPECIFICS) {
            const isSel = selected.includes(s);
            html += `<button class="menu-chip check ${isSel ? 'selected' : ''}" data-value="${s}">${isSel ? '✅ ' : ''}${s}</button>`;
        }
        html += '</div>';

        html += `<div class="px-16 py-12 flex-col gap-8">
            <button class="btn btn-primary" id="btn-spec-proceed">Procedi</button>
            <button class="btn btn-secondary" id="btn-spec-skip">Salta (nessuna specifica)</button>
        </div>`;
        html += this._backButton();
        container.innerHTML = html;

        // Toggle chips
        container.querySelectorAll('.menu-chip.check').forEach((chip) => {
            chip.addEventListener('click', () => {
                const val = chip.dataset.value;
                const idx = this.obs.specifics.indexOf(val);
                if (idx >= 0) {
                    this.obs.specifics.splice(idx, 1);
                } else {
                    this.obs.specifics.push(val);
                }
                this.renderStep();
            });
        });

        document.getElementById('btn-spec-proceed').addEventListener('click', () => {
            this.step = 'details';
            this.renderStep();
        });

        document.getElementById('btn-spec-skip').addEventListener('click', () => {
            this.obs.specifics = [];
            this.step = 'details';
            this.renderStep();
        });

        this._bindBack();
    },

    // ========== STEP: ATTRIBUTI (multi-select) ==========
    renderDetails(container) {
        UI.setTitle('Attributi');
        const selected = this.obs.attributes || [];

        let html = this._wizardHeader(this.obs.phenomenon || '?', 'Seleziona attributi (multipla, poi Procedi)');

        if (selected.length > 0) {
            html += `<div class="px-16 mb-8"><span class="text-hint">Selezionati: <strong style="color:var(--text)">${selected.join(', ')}</strong></span></div>`;
        }

        html += '<div class="chip-list px-16">';
        for (const a of CONFIG.ATTRIBUTES) {
            const isSel = selected.includes(a);
            html += `<button class="menu-chip check ${isSel ? 'selected' : ''}" data-value="${a}">${isSel ? '✅ ' : ''}${a}</button>`;
        }
        html += '</div>';

        html += `<div class="px-16 py-12 flex-col gap-8">
            <button class="btn btn-primary" id="btn-det-proceed">Procedi</button>
            <button class="btn btn-secondary" id="btn-det-skip">Salta (nessun attributo)</button>
        </div>`;
        html += this._backButton();
        container.innerHTML = html;

        container.querySelectorAll('.menu-chip.check').forEach((chip) => {
            chip.addEventListener('click', () => {
                const val = chip.dataset.value;
                const idx = this.obs.attributes.indexOf(val);
                if (idx >= 0) {
                    this.obs.attributes.splice(idx, 1);
                } else {
                    this.obs.attributes.push(val);
                }
                this.renderStep();
            });
        });

        document.getElementById('btn-det-proceed').addEventListener('click', () => {
            this.step = 'prosecution';
            this.renderStep();
        });

        document.getElementById('btn-det-skip').addEventListener('click', () => {
            this.obs.attributes = [];
            this.step = 'prosecution';
            this.renderStep();
        });

        this._bindBack();
    },

    // ========== STEP: PROSECUZIONE ==========
    renderProsecution(container) {
        UI.setTitle('Prosecuzione');
        let html = this._wizardHeader(this.obs.phenomenon || '?', 'Il difetto prosegue su altra superficie?');

        if (this.obs.prosecutions.length > 0) {
            html += `<div class="px-16 mb-8"><span class="text-hint">Prosegue su: <strong style="color:var(--text)">${this.obs.prosecutions.join(', ')}</strong></span></div>`;
        }

        html += `<div class="btn-grid px-16">
            <button class="btn-choice" data-value="yes">Si, prosegue</button>
            <button class="btn-choice" data-value="no">No</button>
        </div>`;
        html += this._backButton();
        container.innerHTML = html;

        container.querySelectorAll('.btn-choice').forEach((btn) => {
            btn.addEventListener('click', () => {
                if (btn.dataset.value === 'yes') {
                    this.step = 'prosecution_target';
                } else {
                    this.step = 'notes';
                }
                this.renderStep();
            });
        });
        this._bindBack();
    },

    // ========== STEP: TARGET PROSECUZIONE ==========
    renderProsecutionTarget(container) {
        UI.setTitle('Dove Prosegue');
        let html = this._wizardHeader('Prosecuzione', 'Seleziona dove prosegue il difetto');

        if (this.obs.prosecutions.length > 0) {
            html += `<div class="px-16 mb-8"><span class="text-hint">Già aggiunti: <strong style="color:var(--text)">${this.obs.prosecutions.join(', ')}</strong></span></div>`;
        }

        html += UI.buttonGrid(CONFIG.PROSECUTION_TARGETS, { cols: 2 });
        html += `<div class="px-16 mt-8"><button class="btn btn-primary" id="btn-pros-done">Fine Prosecuzione</button></div>`;
        html += this._backButton();
        container.innerHTML = html;

        container.querySelectorAll('.btn-choice').forEach((btn) => {
            btn.addEventListener('click', () => {
                const target = btn.dataset.value;
                if (!this.obs.prosecutions.includes(target)) {
                    this.obs.prosecutions.push(target);
                }
                // Re-render per mostrare aggiornamento
                this.renderStep();
            });
        });

        document.getElementById('btn-pros-done').addEventListener('click', () => {
            this.step = 'notes';
            this.renderStep();
        });
        this._bindBack();
    },

    // ========== STEP: NOTE ==========
    renderNotes(container) {
        UI.setTitle('Note');
        let html = this._wizardHeader('Note aggiuntive', 'Opzionale - aggiungi note libere');
        html += `<div class="form-group px-16">
            <textarea class="form-input" id="wizard-notes" placeholder="Note aggiuntive (opzionale)..." rows="3">${this.obs.notes || ''}</textarea>
        </div>
        <div class="px-16 py-12">
            <button class="btn btn-primary" id="btn-next-notes">Avanti</button>
        </div>`;
        html += this._backButton();
        container.innerHTML = html;

        document.getElementById('btn-next-notes').addEventListener('click', () => {
            this.obs.notes = document.getElementById('wizard-notes').value.trim();
            this.step = 'photo';
            this.renderStep();
        });
        this._bindBack();
    },

    // ========== STEP: FOTO DETTAGLIO ==========
    renderPhoto(container) {
        UI.setTitle('Foto Dettaglio');
        let html = this._wizardHeader('Foto del difetto', 'Scatta o seleziona una foto di dettaglio');
        html += `<div class="empty-state" style="padding: 24px;"><div class="empty-state-icon">📸</div></div>
        <div class="px-16 py-12 flex-col gap-8">
            <button class="btn btn-primary" id="btn-take-photo">📷 Scatta Foto</button>
            <button class="btn btn-outline" id="btn-gallery-photo">🖼 Carica da Galleria</button>
            <button class="btn btn-secondary" id="btn-skip-photo">Salta (senza foto)</button>
        </div>`;
        html += this._backButton();
        container.innerHTML = html;

        const savePhoto = async (result) => {
            if (result) {
                const { id, filename } = await Photos.save(
                    this.sopId, this.roomName, 'dettaglio',
                    result.blob, result.thumbnail
                );
                this.obs.photo_id = id;

                await Events.dispatch('add_photo', this.sopId, {
                    room_name: this.roomName,
                    photo_id: id,
                    type: 'dettaglio',
                    filename: filename
                });

                UI.toast('Foto salvata');
                this.step = 'confirm';
                this.renderStep();
            }
        };

        document.getElementById('btn-take-photo').addEventListener('click', async () => {
            savePhoto(await Photos.takePhoto());
        });

        document.getElementById('btn-gallery-photo').addEventListener('click', async () => {
            savePhoto(await Photos.fromGallery());
        });

        document.getElementById('btn-skip-photo').addEventListener('click', () => {
            this.obs.photo_id = null;
            this.step = 'confirm';
            this.renderStep();
        });
        this._bindBack();
    },

    // ========== STEP: CONFERMA ==========
    async renderConfirm(container) {
        UI.setTitle('Conferma');

        const previewText = formatObservationText(this.obs);

        let html = this._wizardHeader('Riepilogo Osservazione', this.roomName);

        // Preview testo generato
        html += `<div class="preview-box">${previewText || 'Osservazione vuota'}</div>`;

        // Dettagli
        html += '<div class="section"><div class="section-body">';
        html += this._confirmRow('Elemento', this.obs.wall || this.obs.balcone_sub || this.obs.element);

        if (this.obs.has_counterwall) {
            html += this._confirmRow('Controparete', 'Si');
        }
        if (this.obs.infisso_type) {
            html += this._confirmRow('Tipo Varco', `${this.obs.infisso_type} ${this.obs.infisso_which || ''}`);
            html += this._confirmRow('Posizione Varco', `${this.obs.infisso_location || ''} ${this.obs.infisso_sub_pos || ''}`);
        }
        if (this.obs.position) {
            html += this._confirmRow('Posizione', this.obs.position);
        }
        if (this.obs.phenomenon) {
            html += this._confirmRow('Fenomeno', this.obs.phenomenon);
        }
        if (this.obs.specifics.length > 0) {
            html += this._confirmRow('Specifiche', this.obs.specifics.join(', '));
        }
        if (this.obs.attributes.length > 0) {
            html += this._confirmRow('Attributi', this.obs.attributes.join(', '));
        }
        if (this.obs.prosecutions.length > 0) {
            html += this._confirmRow('Prosegue su', this.obs.prosecutions.join(', '));
        }
        if (this.obs.notes) {
            html += this._confirmRow('Note', this.obs.notes);
        }
        html += this._confirmRow('Foto', this.obs.photo_id ? 'Si' : 'No');
        html += '</div></div>';

        // Foto thumbnail
        if (this.obs.photo_id) {
            const thumbUrl = await Photos.getThumbnailUrl(this.obs.photo_id);
            if (thumbUrl) {
                html += `<div class="px-16"><img src="${thumbUrl}" style="width:120px; border-radius:8px;" alt="Foto dettaglio"></div>`;
            }
        }

        // Bottoni
        html += `<div class="px-16 py-12 flex-col gap-8">
            <button class="btn btn-primary" id="btn-save-obs">Salva Osservazione</button>
            <button class="btn btn-outline" id="btn-save-and-new">Salva e Nuova Osservazione</button>
            <button class="btn btn-secondary" id="btn-cancel-obs">Annulla</button>
        </div><div style="height: 32px;"></div>`;

        container.innerHTML = html;

        document.getElementById('btn-save-obs').addEventListener('click', async () => {
            await this.saveObservation();
            App.navigate(`rooms/${this.sopId}/${encodeURIComponent(this.roomName)}`);
        });

        document.getElementById('btn-save-and-new').addEventListener('click', async () => {
            await this.saveObservation();
            this.step = 'element';
            this.obs = {
                element: null, wall: null, has_counterwall: false, balcone_sub: null,
                positions_selected: [], position: null, phenomenon: null,
                specifics: [], attributes: [], prosecutions: [],
                notes: '', photo_id: null, non_visibile: false, parz_ingombra: false,
                infisso_type: null, infisso_location: null, infisso_wall: null,
                infisso_which: null, infisso_sub_pos: null
            };
            this.renderStep();
        });

        document.getElementById('btn-cancel-obs').addEventListener('click', () => {
            App.navigate(`rooms/${this.sopId}/${encodeURIComponent(this.roomName)}`);
        });
    },

    _confirmRow(label, value) {
        return `<div class="cell" style="cursor:default"><div class="cell-body">
            <div class="cell-subtitle">${label}</div>
            <div class="cell-title">${value}</div>
        </div></div>`;
    },

    async saveObservation() {
        await Events.dispatch('add_observation', this.sopId, {
            room_name: this.roomName,
            element: this.obs.element,
            wall: this.obs.wall,
            has_counterwall: this.obs.has_counterwall,
            balcone_sub: this.obs.balcone_sub,
            position: this.obs.position,
            positions_selected: this.obs.positions_selected,
            phenomenon: this.obs.phenomenon,
            specifics: this.obs.specifics,
            attributes: this.obs.attributes,
            prosecutions: this.obs.prosecutions,
            notes: this.obs.notes,
            photo_id: this.obs.photo_id,
            non_visibile: this.obs.non_visibile,
            parz_ingombra: this.obs.parz_ingombra,
            infisso_type: this.obs.infisso_type,
            infisso_location: this.obs.infisso_location,
            infisso_wall: this.obs.infisso_wall,
            infisso_which: this.obs.infisso_which,
            infisso_sub_pos: this.obs.infisso_sub_pos
        });
        UI.toast('Osservazione salvata');
    },

    /**
     * Helper: label corrente basato sull'elemento/parete/balcone
     */
    _getCurrentLabel() {
        if (this.obs.wall) {
            let label = this.obs.wall;
            if (this.obs.has_counterwall) label += ' con controparete';
            return label;
        }
        if (this.obs.balcone_sub) return `Balcone - ${this.obs.balcone_sub}`;
        if (this.obs.infisso_type) {
            return `${this.obs.infisso_type} ${this.obs.infisso_which || ''} ${this.obs.infisso_sub_pos || ''}`.trim();
        }
        return this.obs.element || '?';
    }
};


/**
 * review.js - Riepilogo sopralluogo e generazione report
 * Allineato al bot: raggruppamento osservazioni per elemento, V.F. renumbering, modifica testo manuale, firmatari
 */
const ReviewView = {
    sopId: null,

    async render(container, params) {
        this.sopId = params[0];
        if (!this.sopId) { App.navigate('home', true); return; }

        const sop = await DB.getSopralluogo(this.sopId);
        if (!sop) { App.navigate('home', true); return; }

        UI.setTitle('Riepilogo');

        const rooms = sop.rooms || {};
        const roomNames = Object.keys(rooms);

        let html = '';

        // Header info
        html += `
            <div class="section">
                <div class="section-body">
                    <div class="cell" style="cursor:default">
                        <div class="cell-body">
                            <div class="cell-title">${sop.building_code} - ${sop.unit_name || sop.unit_type}</div>
                            <div class="cell-subtitle">${sop.building_address || ''} | ${sop.floor} | ${sop.stair}</div>
                        </div>
                    </div>
                </div>
            </div>
        `;

        // Anagrafica
        if (sop.owner) {
            const ownerText = sop.owner.type === 'persona'
                ? (sop.owner.name || '-')
                : `${sop.owner.company_name || '-'} (${sop.owner.company_admin || '-'})`;
            html += UI.section('PROPRIETARIO', `<div class="cell" style="cursor:default"><div class="cell-body"><div class="cell-title">${ownerText}</div></div></div>`);
        }

        // Statistiche
        let totalObs = 0;
        let totalPhotos = 0;
        for (const name of roomNames) {
            totalObs += (rooms[name].observations || []).length;
            totalPhotos += (rooms[name].photos || []).length;
        }

        html += UI.section('STATISTICHE', `<div class="cell" style="cursor:default"><div class="cell-body">
            <div class="cell-title">Vani: ${roomNames.length} | Osservazioni: ${totalObs} | Foto: ${totalPhotos}</div>
        </div></div>`);

        // Per ogni vano: osservazioni raggruppate
        for (const roomName of roomNames) {
            const room = rooms[roomName];
            const observations = room.observations || [];

            let roomHtml = `<div class="cell" style="cursor:default">
                <div class="cell-body">
                    <div class="cell-title">${roomName} ${UI.statusBadge(room.status)}</div>
                    <div class="cell-subtitle">Soffitto: ${room.finishes || '-'} | Osservazioni: ${observations.length}</div>
                </div>
            </div>`;

            html += UI.section(roomName.toUpperCase(), roomHtml);

            // Testo: manual_text o generato
            if (room.manual_text) {
                html += `<div class="preview-box" style="white-space:pre-wrap; font-size:13px; border-left:3px solid var(--btn);">${room.manual_text}</div>`;
            } else if (observations.length > 0) {
                // Genera testo raggruppato con V.F.
                const groupedText = this.generateRoomText(observations);
                html += `<div class="preview-box" style="white-space:pre-wrap; font-size:13px;">${groupedText}</div>`;
            } else {
                html += `<div class="text-center text-hint py-12">Nessuna osservazione</div>`;
            }

            // Bottone modifica testo manuale
            html += `<div class="px-16 py-4"><button class="btn btn-secondary btn-sm" data-room-edit="${roomName}">Modifica Testo</button></div>`;
        }

        // Preview verbale completo
        html += UI.section('PREVIEW VERBALE', '');
        let verbaleText = this.generateVerbalePreview(sop);
        html += `<div class="preview-box" style="white-space:pre-wrap; font-style:normal; font-size:13px;">${verbaleText}</div>`;

        // Note globali
        html += this.renderGlobalNotes(sop);

        // Firmatari
        html += this.renderSigners(sop);

        // Bottoni azione
        html += `
            <div class="px-16 py-12 flex-col gap-8">
                <button class="btn btn-primary" id="btn-sync-report">Sincronizza e Genera Report</button>
                <button class="btn btn-outline" id="btn-export-json">Esporta JSON</button>
                <button class="btn btn-secondary" id="btn-back-rooms">Torna ai Vani</button>
            </div>
            <div style="height: 32px;"></div>
        `;

        container.innerHTML = html;

        // Events
        this.bindEvents(sop);
    },

    /**
     * Genera testo raggruppato per vano con V.F. renumbering (come il bot)
     * Raggruppa osservazioni per elemento, separando con virgola (stesso elemento) e punto e virgola (elementi diversi)
     */
    generateRoomText(observations) {
        if (!observations || observations.length === 0) return '';

        // V.F. renumbering: conta solo foto reali (non NOFOTO/NDR/INGOMBRA senza foto)
        let vfIndex = 0;
        const vfMap = []; // index observation → V.F. number (0 = no photo)

        for (const obs of observations) {
            if (obs.photo_id) {
                vfIndex++;
                vfMap.push(vfIndex);
            } else {
                vfMap.push(0);
            }
        }

        // Raggruppa per elemento
        const groups = {};
        for (let i = 0; i < observations.length; i++) {
            const obs = observations[i];
            const elemKey = obs.wall || obs.balcone_sub || obs.infisso_type || obs.element || '?';
            if (!groups[elemKey]) groups[elemKey] = [];
            groups[elemKey].push({ obs, vf: vfMap[i], index: i });
        }

        const lines = [];
        for (const [elemKey, items] of Object.entries(groups)) {
            const parts = [];
            for (const { obs, vf } of items) {
                let text = formatObservationText(obs);
                if (vf > 0) text += ` (V.F. ${vf})`;
                parts.push(text);
            }
            // Stessi elementi: virgola. Il punto e virgola separa gruppi.
            lines.push(parts.join(', '));
        }

        return lines.join(';\n') + (lines.length > 0 ? ';' : '');
    },

    /**
     * Genera preview testo del verbale completo
     */
    generateVerbalePreview(sop) {
        const rooms = sop.rooms || {};
        const roomNames = Object.keys(rooms);
        let lines = [];

        lines.push(`VERBALE DI SOPRALLUOGO`);
        lines.push(`Fabbricato: ${sop.building_code} - ${sop.building_address || ''}`);
        lines.push(`Piano: ${sop.floor} | Scala: ${sop.stair}`);
        lines.push(`Unità: ${sop.unit_name || sop.unit_type}`);
        lines.push('');

        if (sop.owner) {
            if (sop.owner.type === 'persona') {
                lines.push(`Proprietario: ${sop.owner.name || '-'}`);
            } else {
                lines.push(`Società: ${sop.owner.company_name || '-'}`);
                lines.push(`Amministratore: ${sop.owner.company_admin || '-'}`);
            }
            lines.push('');
        }

        // Presenti
        if (sop.attendees) {
            if (sop.attendees.metro_tech) lines.push(`Metro C Tecnico: ${sop.attendees.metro_tech}`);
            const collText = Array.isArray(sop.attendees.metro_coll)
                ? sop.attendees.metro_coll.join(', ')
                : (sop.attendees.metro_coll || '');
            if (collText) lines.push(`Metro C Collaboratori: ${collText}`);
            if (sop.attendees.rm) lines.push(`Roma Metropolitane: ${sop.attendees.rm}`);
            lines.push('');
        }

        for (const roomName of roomNames) {
            const room = rooms[roomName];
            const finishLabel = room.finishes === 'Controsoffitto' ? 'C/S' : '';
            lines.push(`--- ${roomName}${finishLabel ? ', ' + finishLabel : ''} ---`);

            if (room.status !== 'accessible') {
                lines.push(`NOTA: ${CONFIG.ROOM_STATUS_LABELS[room.status] || room.status}`);
            }

            if (room.manual_text) {
                lines.push(room.manual_text);
            } else {
                const observations = room.observations || [];
                if (observations.length === 0) {
                    lines.push('Nessuna osservazione.');
                } else {
                    lines.push(this.generateRoomText(observations));
                }
            }
            lines.push('');
        }

        // Note globali
        if (Array.isArray(sop.global_notes) && sop.global_notes.length > 0) {
            lines.push('--- NOTE ---');
            for (const note of sop.global_notes) {
                const prefix = note.room_name ? `[${note.room_name}] ` : '';
                lines.push(`${prefix}${note.text}`);
            }
            lines.push('');
        }

        // Firme
        lines.push('--- FIRME ---');
        const signers = sop.signers || {};
        lines.push(`Metro C: ${signers.metro_tech || '________________'}`);
        lines.push(`Roma Metropolitane: ${signers.rm || '________________'}`);
        lines.push(`Proprietario/Delegato: ________________`);

        return lines.join('\n');
    },

    /**
     * Render sezione note globali
     */
    renderGlobalNotes(sop) {
        const notes = Array.isArray(sop.global_notes) ? sop.global_notes : [];

        let html = `<div class="section"><div class="section-header">NOTE GLOBALI</div></div>`;

        if (notes.length > 0) {
            for (let i = 0; i < notes.length; i++) {
                const note = notes[i];
                const typeLabel = CONFIG.DISCLAIMER_TYPES.find(d => d.value === note.type)?.label || note.type || 'Nota';
                html += `<div class="obs-card" data-note-index="${i}">
                    <div class="obs-card-element">${typeLabel}${note.room_name ? ' - ' + note.room_name : ''}</div>
                    <div class="obs-card-text">${note.text}</div>
                    <div class="obs-card-footer">
                        <button class="obs-btn-delete" data-note-delete="${i}" title="Elimina">🗑</button>
                    </div>
                </div>`;
            }
        } else {
            html += `<div class="text-center text-hint py-12">Nessuna nota globale</div>`;
        }

        html += `<div class="px-16 py-4"><button class="btn btn-outline" id="btn-add-global-note">Aggiungi Nota Globale</button></div>`;

        return html;
    },

    /**
     * Render sezione firmatari
     */
    renderSigners(sop) {
        const signers = sop.signers || {};
        let html = `<div class="section"><div class="section-header">FIRMATARI</div><div class="section-body">`;

        html += `<div class="form-group">
            <label class="form-label">Metro C Tecnico</label>
            <input class="form-input signer-input" data-signer="metro_tech" value="${signers.metro_tech || ''}" placeholder="Nome firmatario Metro C">
        </div>`;
        html += `<div class="form-group">
            <label class="form-label">Roma Metropolitane</label>
            <input class="form-input signer-input" data-signer="rm" value="${signers.rm || ''}" placeholder="Nome firmatario RM">
        </div>`;
        html += `<div class="form-group">
            <label class="form-label">Collaboratore Metro C</label>
            <input class="form-input signer-input" data-signer="metro_coll" value="${signers.metro_coll || ''}" placeholder="Nome firmatario collaboratore">
        </div>`;

        html += `</div></div>`;
        return html;
    },

    bindEvents(sop) {
        // Sync report
        document.getElementById('btn-sync-report')?.addEventListener('click', async () => {
            // Salva firmatari prima
            await this._saveSigners();

            if (typeof Sync !== 'undefined' && !Sync.isOnline()) {
                UI.toast('Sei offline. Connettiti per sincronizzare.');
                return;
            }
            if (typeof Sync !== 'undefined') {
                await Sync.sendToBot(this.sopId);
            } else {
                UI.toast('Sync non disponibile');
            }
        });

        // Export JSON
        document.getElementById('btn-export-json')?.addEventListener('click', async () => {
            await this._saveSigners();
            await this.exportJSON(sop);
        });

        // Torna ai vani
        document.getElementById('btn-back-rooms')?.addEventListener('click', () => {
            App.navigate(`rooms/${this.sopId}`);
        });

        // Modifica testo manuale per vano
        document.querySelectorAll('[data-room-edit]').forEach((btn) => {
            btn.addEventListener('click', () => {
                const roomName = btn.dataset.roomEdit;
                this.showEditManualTextModal(sop, roomName);
            });
        });

        // Aggiungi nota globale
        document.getElementById('btn-add-global-note')?.addEventListener('click', () => {
            this.showAddGlobalNoteModal();
        });

        // Elimina nota globale
        document.querySelectorAll('[data-note-delete]').forEach((btn) => {
            btn.addEventListener('click', () => {
                const idx = parseInt(btn.dataset.noteDelete);
                UI.confirmAction('Eliminare questa nota?', async () => {
                    await Events.dispatch('delete_global_note', this.sopId, { note_index: idx });
                    UI.toast('Nota eliminata');
                    const updatedSop = await DB.getSopralluogo(this.sopId);
                    this.render(document.getElementById('app-content'), [this.sopId]);
                });
            });
        });

        // Salvataggio firmatari on blur
        document.querySelectorAll('.signer-input').forEach((input) => {
            input.addEventListener('blur', () => this._saveSigners());
        });
    },

    async _saveSigners() {
        const signers = {};
        document.querySelectorAll('.signer-input').forEach((input) => {
            signers[input.dataset.signer] = input.value.trim();
        });
        await Events.dispatch('set_signers', this.sopId, signers);
    },

    showEditManualTextModal(sop, roomName) {
        const room = sop.rooms[roomName];
        const currentText = room.manual_text || this.generateRoomText(room.observations || []);

        let html = `<div class="modal-title">Modifica Testo - ${roomName}</div>
        <div class="form-group">
            <textarea class="form-input" id="modal-manual-text" rows="10" style="font-size:13px; font-family:monospace;">${currentText}</textarea>
        </div>
        <div class="px-16 flex-col gap-8">
            <button class="btn btn-primary" id="modal-save-text">Salva</button>
            <button class="btn btn-outline" id="modal-reset-text">Ripristina Auto-Generato</button>
            <button class="btn btn-secondary" id="modal-cancel-text">Annulla</button>
        </div>`;
        UI.showModal(html);

        document.getElementById('modal-save-text').addEventListener('click', async () => {
            const text = document.getElementById('modal-manual-text').value;
            await Events.dispatch('set_manual_text', this.sopId, {
                room_name: roomName,
                text: text
            });
            UI.hideModal();
            UI.toast('Testo salvato');
            const updatedSop = await DB.getSopralluogo(this.sopId);
            this.render(document.getElementById('app-content'), [this.sopId]);
        });

        document.getElementById('modal-reset-text').addEventListener('click', async () => {
            await Events.dispatch('set_manual_text', this.sopId, {
                room_name: roomName,
                text: null
            });
            UI.hideModal();
            UI.toast('Testo ripristinato');
            const updatedSop = await DB.getSopralluogo(this.sopId);
            this.render(document.getElementById('app-content'), [this.sopId]);
        });

        document.getElementById('modal-cancel-text').addEventListener('click', () => UI.hideModal());
    },

    showAddGlobalNoteModal() {
        let html = `<div class="modal-title">Aggiungi Nota Globale</div>
        <div class="form-group">
            <label class="form-label">Tipo</label>
            <div class="btn-grid" style="padding:0; margin-top:8px;">`;

        for (const dt of CONFIG.DISCLAIMER_TYPES) {
            html += `<button class="btn-choice note-type-btn" data-value="${dt.value}">${dt.label}</button>`;
        }
        html += `<button class="btn-choice note-type-btn" data-value="generic">Nota Generica</button>`;
        html += `</div></div>
