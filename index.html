// ==================== SETUP VIEW ====================
const SetupView = {
    steps: [
        { key: 'building_code', label: 'Codice Fabbricato', type: 'text', placeholder: 'Es. 100C, 3B' },
        { key: 'building_address', label: 'Indirizzo Fabbricato', type: 'text', placeholder: 'Es. Via Roma, 10' },
        { key: 'floor', label: 'Piano', type: 'choice', options: () => CONFIG.FLOORS },
        { key: 'stair', label: 'Scala', type: 'choice', options: () => CONFIG.STAIRS },
        { key: 'unit_type', label: 'Tipo Unit\u00e0', type: 'choice', options: () => CONFIG.UNIT_TYPES },
        { key: 'subalterno', label: 'Subalterno', type: 'text', placeholder: 'Es. 500' },
        { key: 'unit_internal', label: 'Interno', type: 'text', placeholder: 'Es. 3, Int A' },
        { key: 'planimetria', label: 'Planimetria', type: 'photo' }
    ],
    currentStep: 0, sopId: null,
    async render(container, params) {
        this.sopId = params[0];
        if (!this.sopId) { App.navigate('home', true); return; }
        const sop = await DB.getSopralluogo(this.sopId);
        if (!sop) { App.navigate('home', true); return; }
        this.currentStep = 0;
        for (let i = 0; i < this.steps.length - 1; i++) { if (sop[this.steps[i].key]) this.currentStep = i + 1; else break; }
        if (sop.planimetria_photo_id) this.currentStep = this.steps.length;
        if (this.currentStep >= this.steps.length) { App.navigate(`anagrafica/${this.sopId}`, true); return; }
        this.renderStep(container, sop);
    },
    renderStep(container, sop) {
        const step = this.steps[this.currentStep];
        UI.setTitle(step.label);
        let html = UI.stepper(this.steps.length, this.currentStep);
        if (this.currentStep > 0) {
            let summary = '<div class="px-16 mb-8">';
            for (let i = 0; i < this.currentStep; i++) { const s = this.steps[i]; const val = sop[s.key] || ''; if (val && s.type !== 'photo') summary += `<span class="text-hint">${s.label}: <strong style="color:var(--text)">${val}</strong> | </span>`; }
            summary += '</div>'; html += summary;
        }
        if (step.type === 'text') {
            html += UI.formInput({ label: step.label, placeholder: step.placeholder, id: 'setup-input', value: sop[step.key] || '' });
            html += '<div class="px-16 mt-8"><button class="btn btn-primary" id="setup-next">Avanti</button></div>';
        } else if (step.type === 'choice') {
            html += `<div class="wizard-header"><div class="wizard-subtitle">Seleziona ${step.label}</div></div>`;
            html += UI.buttonGrid(step.options());
            html += '<div class="px-16 mt-8"><input class="form-input" type="text" id="setup-manual" placeholder="Oppure scrivi manualmente..."><button class="btn btn-secondary mt-8" id="setup-manual-btn" style="display:none">Usa valore inserito</button></div>';
        } else if (step.type === 'photo') {
            html += '<div class="empty-state"><div class="empty-state-icon">\uD83D\uDCD0</div><div class="empty-state-title">Carica la planimetria</div><div class="empty-state-text">Scatta una foto o seleziona dalla galleria</div></div>';
            html += '<div class="px-16"><button class="btn btn-primary mb-8" id="setup-photo">Scatta / Seleziona Foto</button><button class="btn btn-secondary" id="setup-skip-photo">Salta</button></div>';
        }
        container.innerHTML = html;
        this.bindEvents(container, step, sop);
    },
    bindEvents(container, step, sop) {
        if (step.type === 'text') {
            const input = document.getElementById('setup-input'); const btn = document.getElementById('setup-next');
            setTimeout(() => input.focus(), 100);
            input.addEventListener('keydown', (e) => { if (e.key === 'Enter') btn.click(); });
            btn.addEventListener('click', async () => { const value = input.value.trim(); if (!value) { UI.toast('Inserisci un valore'); return; } await this.saveStep(step.key, value); });
        } else if (step.type === 'choice') {
            container.querySelectorAll('.btn-choice').forEach((btn) => { btn.addEventListener('click', async () => { await this.saveStep(step.key, btn.dataset.value); }); });
            const manualInput = document.getElementById('setup-manual'); const manualBtn = document.getElementById('setup-manual-btn');
            manualInput.addEventListener('input', () => { manualBtn.style.display = manualInput.value.trim() ? 'block' : 'none'; });
            manualBtn.addEventListener('click', async () => { const value = manualInput.value.trim(); if (value) await this.saveStep(step.key, value); });
        } else if (step.type === 'photo') {
            document.getElementById('setup-photo').addEventListener('click', async () => {
                const result = await Photos.capture();
                if (result) { const { id } = await Photos.save(this.sopId, '__planimetria__', 'planimetria', result.blob, result.thumbnail); await Events.dispatch('upload_planimetria', this.sopId, { photo_id: id }); UI.toast('Planimetria caricata'); App.navigate(`anagrafica/${this.sopId}`); }
            });
            document.getElementById('setup-skip-photo').addEventListener('click', () => { App.navigate(`anagrafica/${this.sopId}`); });
        }
    },
    async saveStep(key, value) {
        if (key === 'building_code') value = value.toUpperCase().trim();
        else if (key === 'building_address') value = value.replace(/\w\S*/g, (w) => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase());
        else if (key === 'unit_internal') { if (!value.toLowerCase().startsWith('int')) value = `Interno ${value}`; }
        await Events.dispatch('update_setup', this.sopId, { [key]: value });
        const sop = await DB.getSopralluogo(this.sopId);
        if (sop.unit_type && sop.subalterno && sop.unit_internal) {
            const unitName = `${sop.unit_type} - Sub. ${sop.subalterno} - ${sop.unit_internal}`;
            if (sop.unit_name !== unitName) await Events.dispatch('update_setup', this.sopId, { unit_name: unitName });
        }
        this.currentStep++;
        if (this.currentStep >= this.steps.length) App.navigate(`anagrafica/${this.sopId}`);
        else { const updatedSop = await DB.getSopralluogo(this.sopId); this.renderStep(document.getElementById('app-content'), updatedSop); }
    }
};

// ==================== ANAGRAFICA VIEW ====================
const AnagraficaView = {
    sopId: null,
    formField(id, label, value) { return `<div class="form-group"><label class="form-label" for="field-${id}">${label}</label><input class="form-input" type="text" id="field-${id}" value="${value || ''}" placeholder="Inserisci ${label.toLowerCase()}"></div>`; },
    async render(container, params) {
        this.sopId = params[0];
        if (!this.sopId) { App.navigate('home', true); return; }
        const sop = await DB.getSopralluogo(this.sopId);
        if (!sop) { App.navigate('home', true); return; }
        UI.setTitle('Anagrafica');
        let html = `<div class="section"><div class="section-header">FABBRICATO</div><div class="section-body"><div class="cell" style="cursor:default"><div class="cell-body"><div class="cell-title">${sop.building_code} - ${sop.building_address || ''}</div><div class="cell-subtitle">${sop.floor || ''} | ${sop.stair || ''} | ${sop.unit_name || sop.unit_type || ''}</div></div></div></div></div>`;
        html += `<div class="section"><div class="section-header">PROPRIETARIO</div><div class="section-body"><div class="form-group"><label class="form-label">Tipo</label><div class="btn-grid" style="padding:0; margin-top:8px;"><button class="btn-choice ${sop.owner && sop.owner.type === 'persona' ? 'selected' : ''}" data-owner-type="persona">Persona</button><button class="btn-choice ${sop.owner && sop.owner.type === 'societa' ? 'selected' : ''}" data-owner-type="societa">Societ\u00e0</button></div></div></div></div>`;
        html += '<div id="owner-fields"></div>';
        html += `<div class="section"><div class="section-header">PRESENTI AL SOPRALLUOGO</div><div class="section-body">${this.formField('metro_tech', 'Tecnico Metro C', sop.attendees?.metro_tech)}${this.formField('metro_coll', 'Collaboratori Metro C', sop.attendees?.metro_coll)}${this.formField('rm', 'Roma Metropolitane', sop.attendees?.rm)}</div></div>`;
        html += '<div class="px-16 py-12"><button class="btn btn-primary" id="btn-proceed">Procedi ai Vani</button></div><div style="height: 32px;"></div>';
        container.innerHTML = html;
        this.renderOwnerFields(sop);
        this.bindEvents(sop);
    },
    renderOwnerFields(sop) {
        const container = document.getElementById('owner-fields'); const type = sop.owner?.type || '';
        let html = '<div class="section"><div class="section-body">';
        if (type === 'persona') html += this.formField('owner_name', 'Nome e Cognome', sop.owner?.name);
        else if (type === 'societa') { html += this.formField('company_name', 'Ragione Sociale', sop.owner?.company_name); html += this.formField('company_admin', 'Amministratore', sop.owner?.company_admin); }
        html += '</div></div>';
        container.innerHTML = type ? html : '';
    },
    bindEvents(sop) {
        document.querySelectorAll('[data-owner-type]').forEach((btn) => {
            btn.addEventListener('click', async () => {
                document.querySelectorAll('[data-owner-type]').forEach((b) => b.classList.remove('selected'));
                btn.classList.add('selected');
                const owner = { type: btn.dataset.ownerType, name: '', company_name: '', company_admin: '' };
                await Events.dispatch('set_anagrafica', this.sopId, { owner });
                const updatedSop = await DB.getSopralluogo(this.sopId);
                this.renderOwnerFields(updatedSop);
            });
        });
        document.getElementById('btn-proceed').addEventListener('click', async () => {
            const owner = { type: sop.owner?.type || 'persona' };
            const nameEl = document.getElementById('field-owner_name'); const companyEl = document.getElementById('field-company_name'); const adminEl = document.getElementById('field-company_admin');
            if (nameEl) owner.name = nameEl.value.trim(); if (companyEl) owner.company_name = companyEl.value.trim(); if (adminEl) owner.company_admin = adminEl.value.trim();
            const attendees = { metro_tech: document.getElementById('field-metro_tech')?.value.trim() || '', metro_coll: document.getElementById('field-metro_coll')?.value.trim() || '', rm: document.getElementById('field-rm')?.value.trim() || '' };
            await Events.dispatch('set_anagrafica', this.sopId, { owner, attendees });
            await Events.dispatch('complete_phase', this.sopId, { phase: 2 });
            UI.toast('Anagrafica salvata');
            App.navigate(`rooms/${this.sopId}`);
        });
    }
};
</script>

<script>
// ==================== ROOMS VIEW ====================
const RoomsView = {
    sopId: null,
    async render(container, params) {
        this.sopId = params[0];
        if (!this.sopId) { App.navigate('home', true); return; }
        const roomParam = params[1] ? decodeURIComponent(params[1]) : null;
        const sop = await DB.getSopralluogo(this.sopId);
        if (!sop) { App.navigate('home', true); return; }
        if (roomParam && sop.rooms[roomParam]) this.renderRoomCard(container, sop, roomParam);
        else this.renderRoomList(container, sop);
    },
    async renderRoomList(container, sop) {
        UI.setTitle(`${sop.building_code} - Vani`);
        const rooms = sop.rooms || {}; const roomNames = Object.keys(rooms);
        let html = `<div class="section"><div class="section-body"><div class="cell" style="cursor:default"><div class="cell-body"><div class="cell-title">${sop.building_code} - ${sop.unit_name || sop.unit_type}</div><div class="cell-subtitle">${sop.floor} | ${sop.stair}</div></div></div></div></div>`;
        html += `<div class="phase-tabs"><button class="phase-tab ${sop.phase === 2 ? 'active' : ''}" data-phase="2">Ricognizione</button><button class="phase-tab ${sop.phase === 3 ? 'active' : ''}" data-phase="3">Analisi Difetti</button></div>`;
        if (roomNames.length > 0) {
            let cells = '';
            for (const name of roomNames) {
                const room = rooms[name]; const obsCount = (room.observations || []).length; const photoCount = (room.photos || []).length;
                const statusIcon = room.status === 'accessible' ? '\uD83D\uDFE2' : room.status === 'non_accessibile' ? '\uD83D\uDFE0' : room.status === 'non_valutabile' ? '\uD83D\uDD34' : '\uD83D\uDFE3';
                cells += UI.cell({ icon: statusIcon, title: name, subtitle: `${room.finishes || 'Soffitto: -'} | Oss: ${obsCount} | Foto: ${photoCount}`, dataId: name });
            }
            html += UI.section('VANI', cells);
        } else html += UI.emptyState('\uD83C\uDFE0', 'Nessun vano', 'Aggiungi il primo vano per iniziare');
        html += `<div class="px-16 py-12"><button class="btn btn-primary mb-8" id="btn-add-room">Aggiungi Vano</button>${roomNames.length > 0 ? '<button class="btn btn-outline" id="btn-review">Riepilogo / Report</button>' : ''}</div><div style="height: 32px;"></div>`;
        container.innerHTML = html;
        this.bindRoomListEvents(container, sop);
    },
    bindRoomListEvents(container, sop) {
        container.querySelectorAll('.cell[data-id]').forEach((cell) => { cell.addEventListener('click', () => { App.navigate(`rooms/${this.sopId}/${encodeURIComponent(cell.dataset.id)}`); }); });
        container.querySelectorAll('.phase-tab').forEach((tab) => { tab.addEventListener('click', async () => { await Events.dispatch('complete_phase', this.sopId, { phase: parseInt(tab.dataset.phase) }); const updatedSop = await DB.getSopralluogo(this.sopId); this.renderRoomList(container, updatedSop); }); });
        document.getElementById('btn-add-room')?.addEventListener('click', () => { this.showAddRoomModal(sop); });
        document.getElementById('btn-review')?.addEventListener('click', () => { App.navigate(`review/${this.sopId}`); });
    },
    showAddRoomModal(sop) {
        const existingRooms = Object.keys(sop.rooms || {}); const nextNum = existingRooms.length + 1;
        let html = `<div class="modal-title">Aggiungi Vano</div><div class="form-group"><label class="form-label">Numero Vano</label><input class="form-input" type="text" id="modal-room-num" value="Vano ${nextNum}" placeholder="Es. Vano 1"></div><div class="form-group"><label class="form-label">Nome Vano</label><input class="form-input" type="text" id="modal-room-name" placeholder="Es. Cucina, Bagno, Ingresso"></div><div class="section-header" style="padding-top:8px">SCEGLI TIPO</div>`;
        html += UI.buttonGrid(CONFIG.ROOM_TYPES, { cols: 3 });
        html += '<div class="px-16 mt-16"><button class="btn btn-primary" id="modal-confirm-room">Conferma</button></div>';
        UI.showModal(html);
        document.querySelectorAll('.modal-content .btn-choice').forEach((btn) => {
            btn.addEventListener('click', () => { document.querySelectorAll('.modal-content .btn-choice').forEach((b) => b.classList.remove('selected')); btn.classList.add('selected'); document.getElementById('modal-room-name').value = btn.dataset.value.charAt(0).toUpperCase() + btn.dataset.value.slice(1).toLowerCase(); });
        });
        document.getElementById('modal-confirm-room').addEventListener('click', async () => {
            const roomNum = document.getElementById('modal-room-num').value.trim(); const roomName = document.getElementById('modal-room-name').value.trim();
            if (!roomNum || !roomName) { UI.toast('Compila numero e nome vano'); return; }
            const fullName = `${roomNum} - ${roomName}`;
            if (sop.rooms && sop.rooms[fullName]) { UI.toast('Vano gi\u00e0 esistente'); return; }
            await Events.dispatch('add_vano', this.sopId, { room_number: roomNum, room_name: roomName, full_name: fullName });
            UI.hideModal(); UI.toast(`${fullName} aggiunto`);
            App.navigate(`rooms/${this.sopId}/${encodeURIComponent(fullName)}`);
        });
    },
    async renderRoomCard(container, sop, roomName) {
        const room = sop.rooms[roomName]; UI.setTitle(roomName);
        let html = `<div class="section"><div class="section-body"><div class="cell" style="cursor:default"><div class="cell-body"><div class="cell-title">Stato: ${UI.statusBadge(room.status)}</div><div class="cell-subtitle">Soffitto: ${room.finishes || 'Non selezionato'}</div></div></div></div></div>`;
        html += '<div class="px-16"><div class="btn-grid"><button class="btn-choice" id="btn-set-status">Stato Vano</button><button class="btn-choice" id="btn-set-ceiling">Soffitto</button></div></div>';
        html += '<div class="section"><div class="section-header">FOTO PANORAMICHE</div><div class="section-body" id="room-photos-panoramic"><div class="px-16 py-12"><button class="btn btn-secondary" id="btn-add-panoramic">Aggiungi Foto Panoramica</button></div></div></div>';
        const observations = room.observations || [];
        html += `<div class="section"><div class="section-header">OSSERVAZIONI (${observations.length})</div></div>`;
        if (observations.length > 0) { for (let i = 0; i < observations.length; i++) html += UI.observationCard(observations[i], i); }
        else html += '<div class="text-center text-hint py-12">Nessuna osservazione</div>';
        html += `<div class="px-16 py-12 flex-col gap-8"><button class="btn btn-primary" id="btn-add-obs">Aggiungi Osservazione</button><button class="btn btn-secondary" id="btn-back-rooms">Torna ai Vani</button></div><div style="height: 32px;"></div>`;
        container.innerHTML = html;
        this.loadPanoramicPhotos(sop, roomName);
        this.bindRoomCardEvents(sop, roomName);
    },
    async loadPanoramicPhotos(sop, roomName) {
        const photos = (await DB.getPhotosBySopralluogo(sop.id)).filter((p) => p.room_name === roomName && p.type === 'panoramica');
        if (photos.length > 0) {
            let gridHtml = '<div class="photo-grid">';
            for (const photo of photos) { if (photo.thumbnail) { const url = URL.createObjectURL(photo.thumbnail); gridHtml += `<div class="photo-thumb"><img src="${url}" alt="${photo.filename}"></div>`; } }
            gridHtml += '</div>';
            const pc = document.getElementById('room-photos-panoramic'); pc.innerHTML = gridHtml + pc.innerHTML;
        }
    },
    bindRoomCardEvents(sop, roomName) {
        document.getElementById('btn-set-status')?.addEventListener('click', () => {
            let html = '<div class="modal-title">Stato Vano</div>';
            html += UI.buttonGrid(CONFIG.ROOM_STATUSES.map((s) => ({ value: s, label: CONFIG.ROOM_STATUS_LABELS[s] })));
            UI.showModal(html);
            document.querySelectorAll('.modal-content .btn-choice').forEach((btn) => { btn.addEventListener('click', async () => { await Events.dispatch('set_room_status', this.sopId, { room_name: roomName, status: btn.dataset.value }); UI.hideModal(); UI.toast('Stato aggiornato'); const updatedSop = await DB.getSopralluogo(this.sopId); this.renderRoomCard(document.getElementById('app-content'), updatedSop, roomName); }); });
        });
        document.getElementById('btn-set-ceiling')?.addEventListener('click', () => {
            let html = '<div class="modal-title">Tipo Soffitto</div>'; html += UI.buttonGrid(CONFIG.CEIL_TYPES); UI.showModal(html);
            document.querySelectorAll('.modal-content .btn-choice').forEach((btn) => { btn.addEventListener('click', async () => { await Events.dispatch('set_room_finishes', this.sopId, { room_name: roomName, ceiling_type: btn.dataset.value }); UI.hideModal(); UI.toast('Soffitto impostato'); const updatedSop = await DB.getSopralluogo(this.sopId); this.renderRoomCard(document.getElementById('app-content'), updatedSop, roomName); }); });
        });
        document.getElementById('btn-add-panoramic')?.addEventListener('click', async () => {
            const result = await Photos.capture();
            if (result) { const { id, filename } = await Photos.save(this.sopId, roomName, 'panoramica', result.blob, result.thumbnail); await Events.dispatch('add_photo', this.sopId, { room_name: roomName, photo_id: id, type: 'panoramica', filename }); UI.toast('Foto panoramica aggiunta'); const updatedSop = await DB.getSopralluogo(this.sopId); this.renderRoomCard(document.getElementById('app-content'), updatedSop, roomName); }
        });
        document.getElementById('btn-add-obs')?.addEventListener('click', () => { App.navigate(`wizard/${this.sopId}/${encodeURIComponent(roomName)}`); });
        document.getElementById('btn-back-rooms')?.addEventListener('click', () => { App.navigate(`rooms/${this.sopId}`); });
    }
};
</script>

<script>
// ==================== WIZARD VIEW ====================
const WizardView = {
    sopId: null, roomName: null, step: 'element', obs: {},
    STEPS_ORDER: ['element', 'wall', 'pre_check', 'infisso_type', 'infisso_wall', 'infisso_which', 'infisso_sub_pos', 'position', 'phenomenon', 'details', 'notes', 'photo', 'confirm'],
    async render(container, params) {
        this.sopId = params[0]; this.roomName = params[1] ? decodeURIComponent(params[1]) : null;
        if (!this.sopId || !this.roomName) { App.navigate('home', true); return; }
        this.step = 'element';
        this.obs = { element: null, wall: null, position: null, phenomenon: null, attributes: [], notes: '', photo_id: null, infisso_type: null, infisso_wall: null, infisso_which: null, infisso_sub_pos: null };
        this.renderStep(container);
    },
    renderStep(container) {
        if (!container) container = document.getElementById('app-content');
        switch (this.step) {
            case 'element': this.renderElement(container); break;
            case 'wall': this.renderWall(container); break;
            case 'pre_check': this.renderPreCheck(container); break;
            case 'infisso_type': this.renderInfissoType(container); break;
            case 'infisso_wall': this.renderInfissoWall(container); break;
            case 'infisso_which': this.renderInfissoWhich(container); break;
            case 'infisso_sub_pos': this.renderInfissoSubPos(container); break;
            case 'position': this.renderPosition(container); break;
            case 'phenomenon': this.renderPhenomenon(container); break;
            case 'details': this.renderDetails(container); break;
            case 'notes': this.renderNotes(container); break;
            case 'photo': this.renderPhoto(container); break;
            case 'confirm': this.renderConfirm(container); break;
        }
    },
    getStepIndex() { return this.STEPS_ORDER.indexOf(this.step); },
    goBack() {
        const idx = this.getStepIndex();
        if (idx <= 0) { App.navigate(`rooms/${this.sopId}/${encodeURIComponent(this.roomName)}`); return; }
        let prevIdx = idx - 1; const prevStep = this.STEPS_ORDER[prevIdx];
        if (prevStep === 'wall' && this.obs.element !== 'Parete') prevIdx--;
        if (prevStep === 'infisso_sub_pos' && this.obs.element !== 'Infisso') prevIdx = this.STEPS_ORDER.indexOf('pre_check');
        if (prevStep === 'pre_check' && this.obs.element === 'Infisso') prevIdx = this.STEPS_ORDER.indexOf('element');
        this.step = this.STEPS_ORDER[Math.max(0, prevIdx)]; this.renderStep();
    },
    renderElement(container) {
        UI.setTitle('Elemento');
        let html = `<div class="wizard-header"><div class="wizard-title">${this.roomName}</div><div class="wizard-subtitle">Seleziona l'elemento da ispezionare</div></div>`;
        html += UI.buttonGrid(CONFIG.ELEMENTS); container.innerHTML = html;
        container.querySelectorAll('.btn-choice').forEach((btn) => { btn.addEventListener('click', () => { this.obs.element = btn.dataset.value; if (this.obs.element === 'Parete') this.step = 'wall'; else if (this.obs.element === 'Infisso') this.step = 'infisso_type'; else this.step = 'pre_check'; this.renderStep(); }); });
    },
    renderWall(container) {
        UI.setTitle('Parete');
        let html = `<div class="wizard-header"><div class="wizard-title">${this.obs.element}</div><div class="wizard-subtitle">Seleziona la parete</div></div>`;
        html += UI.buttonGrid(CONFIG.WALL_LABELS); container.innerHTML = html;
        container.querySelectorAll('.btn-choice').forEach((btn) => { btn.addEventListener('click', () => { this.obs.wall = btn.dataset.value; this.step = 'pre_check'; this.renderStep(); }); });
    },
    renderPreCheck(container) {
        const elem = this.obs.wall || this.obs.element; UI.setTitle('Pre-Check');
        let html = `<div class="wizard-header"><div class="wizard-title">${elem}</div><div class="wizard-subtitle">Condizione dell'elemento</div></div>`;
        html += UI.buttonGrid([{ value: 'NDR', label: 'NDR (Nulla da Rilevare)' }, { value: 'INGOMBRA', label: 'INGOMBRA' }, { value: 'PROCEDI', label: 'Procedi con Analisi' }]);
        container.innerHTML = html;
        container.querySelectorAll('.btn-choice').forEach((btn) => {
            btn.addEventListener('click', async () => {
                const value = btn.dataset.value;
                if (value === 'NDR') { await Events.dispatch('set_room_ndr', this.sopId, { room_name: this.roomName, element: this.obs.element, wall: this.obs.wall }); UI.toast('NDR registrato'); App.navigate(`rooms/${this.sopId}/${encodeURIComponent(this.roomName)}`); }
                else if (value === 'INGOMBRA') { await Events.dispatch('set_room_ingombra', this.sopId, { room_name: this.roomName, element: this.obs.element, wall: this.obs.wall }); UI.toast('Ingombra registrato'); App.navigate(`rooms/${this.sopId}/${encodeURIComponent(this.roomName)}`); }
                else { this.step = 'position'; this.renderStep(); }
            });
        });
    },
    renderInfissoType(container) {
        UI.setTitle('Tipo Infisso');
        let html = `<div class="wizard-header"><div class="wizard-title">Infisso</div><div class="wizard-subtitle">Seleziona il tipo di infisso</div></div>`;
        html += UI.buttonGrid(CONFIG.INFISSO_TYPES); container.innerHTML = html;
        container.querySelectorAll('.btn-choice').forEach((btn) => { btn.addEventListener('click', () => { this.obs.infisso_type = btn.dataset.value; this.step = 'infisso_wall'; this.renderStep(); }); });
    },
    renderInfissoWall(container) {
        UI.setTitle('Parete Infisso');
        let html = `<div class="wizard-header"><div class="wizard-title">${this.obs.infisso_type}</div><div class="wizard-subtitle">Su quale parete si trova?</div></div>`;
        html += UI.buttonGrid(CONFIG.WALL_LABELS); container.innerHTML = html;
        container.querySelectorAll('.btn-choice').forEach((btn) => { btn.addEventListener('click', () => { this.obs.infisso_wall = btn.dataset.value; this.step = 'infisso_which'; this.renderStep(); }); });
    },
    renderInfissoWhich(container) {
        UI.setTitle('Quale Infisso');
        let html = `<div class="wizard-header"><div class="wizard-title">${this.obs.infisso_type} - ${this.obs.infisso_wall}</div><div class="wizard-subtitle">Quale infisso? (da sinistra)</div></div>`;
        html += UI.buttonGrid(['1\u00B0 da SX', '2\u00B0 da SX', '3\u00B0 da SX', 'unico']); container.innerHTML = html;
        container.querySelectorAll('.btn-choice').forEach((btn) => { btn.addEventListener('click', () => { this.obs.infisso_which = btn.dataset.value; this.step = 'infisso_sub_pos'; this.renderStep(); }); });
    },
    renderInfissoSubPos(container) {
        UI.setTitle('Dettaglio Infisso');
        let html = `<div class="wizard-header"><div class="wizard-title">${this.obs.infisso_type} ${this.obs.infisso_which}</div><div class="wizard-subtitle">Parte specifica dell'infisso</div></div>`;
        html += UI.buttonGrid(CONFIG.INFISSO_DETAILS, { cols: 3 }); container.innerHTML = html;
        container.querySelectorAll('.btn-choice').forEach((btn) => { btn.addEventListener('click', () => { this.obs.infisso_sub_pos = btn.dataset.value; this.obs.position = `${this.obs.infisso_type} ${this.obs.infisso_which} ${this.obs.infisso_wall} ${this.obs.infisso_sub_pos}`; this.step = 'phenomenon'; this.renderStep(); }); });
    },
    renderPosition(container) {
        const elem = this.obs.wall || this.obs.element; UI.setTitle('Posizione');
        let html = `<div class="wizard-header"><div class="wizard-title">${elem}</div><div class="wizard-subtitle">Seleziona la posizione del difetto</div></div>`;
        if (this.obs.element === 'Parete') html += UI.groupedMenu(CONFIG.POS_WALL_MENUS);
        else { const positions = CONFIG.getPositions(this.obs.element); if (positions) html += UI.chipList(positions); }
        container.innerHTML = html;
        container.querySelectorAll('.menu-chip').forEach((chip) => { chip.addEventListener('click', () => { this.obs.position = chip.dataset.value; this.step = 'phenomenon'; this.renderStep(); }); });
    },
    renderPhenomenon(container) {
        const elem = this.obs.wall || this.obs.element; UI.setTitle('Fenomeno');
        let html = `<div class="wizard-header"><div class="wizard-title">${elem} - ${this.obs.position || ''}</div><div class="wizard-subtitle">Seleziona il fenomeno/difetto</div></div>`;
        if (this.obs.element === 'Parete') html += UI.groupedMenu(CONFIG.PHEN_WALL_MENUS);
        else { const phenomena = CONFIG.getPhenomena(this.obs.element); if (phenomena) html += UI.chipList(phenomena); }
        container.innerHTML = html;
        container.querySelectorAll('.menu-chip').forEach((chip) => { chip.addEventListener('click', () => { this.obs.phenomenon = chip.dataset.value; this.step = (this.obs.phenomenon === 'NESSUN DIFETTO' || this.obs.phenomenon === 'Non Visibile') ? 'notes' : 'details'; this.renderStep(); }); });
    },
    renderDetails(container) {
        UI.setTitle('Dettagli');
        let html = `<div class="wizard-header"><div class="wizard-title">${this.obs.phenomenon}</div><div class="wizard-subtitle">Seleziona attributi (multi-selezione)</div></div>`;
        html += UI.groupedMenu(CONFIG.ATTRIBUTES_MENUS, true);
        html += '<div class="px-16 py-12"><button class="btn btn-primary" id="btn-confirm-details">Conferma Dettagli</button><button class="btn btn-secondary mt-8" id="btn-skip-details">Salta (nessun dettaglio)</button></div>';
        container.innerHTML = html;
        container.querySelectorAll('.menu-chip.check').forEach((chip) => { chip.addEventListener('click', () => { chip.classList.toggle('selected'); }); });
        document.getElementById('btn-confirm-details').addEventListener('click', () => { const selected = []; container.querySelectorAll('.menu-chip.check.selected').forEach((chip) => { selected.push(chip.dataset.value); }); this.obs.attributes = selected; this.step = 'notes'; this.renderStep(); });
        document.getElementById('btn-skip-details').addEventListener('click', () => { this.obs.attributes = []; this.step = 'notes'; this.renderStep(); });
    },
    renderNotes(container) {
        UI.setTitle('Note');
        let html = `<div class="wizard-header"><div class="wizard-title">Note aggiuntive</div><div class="wizard-subtitle">Opzionale - aggiungi note libere</div></div><div class="form-group"><textarea class="form-input" id="wizard-notes" placeholder="Note aggiuntive (opzionale)..." rows="3">${this.obs.notes || ''}</textarea></div><div class="px-16 py-12"><button class="btn btn-primary" id="btn-next-notes">Avanti</button></div>`;
        container.innerHTML = html;
        document.getElementById('btn-next-notes').addEventListener('click', () => { this.obs.notes = document.getElementById('wizard-notes').value.trim(); this.step = 'photo'; this.renderStep(); });
    },
    renderPhoto(container) {
        UI.setTitle('Foto Dettaglio');
        let html = '<div class="wizard-header"><div class="wizard-title">Foto del difetto</div><div class="wizard-subtitle">Scatta una foto di dettaglio del difetto</div></div><div class="empty-state" style="padding: 24px;"><div class="empty-state-icon">\uD83D\uDCF8</div></div><div class="px-16 py-12 flex-col gap-8"><button class="btn btn-primary" id="btn-take-photo">Scatta / Seleziona Foto</button><button class="btn btn-secondary" id="btn-skip-photo">Salta (senza foto)</button></div>';
        container.innerHTML = html;
        document.getElementById('btn-take-photo').addEventListener('click', async () => {
            const result = await Photos.capture();
            if (result) { const { id, filename } = await Photos.save(this.sopId, this.roomName, 'dettaglio', result.blob, result.thumbnail); this.obs.photo_id = id; await Events.dispatch('add_photo', this.sopId, { room_name: this.roomName, photo_id: id, type: 'dettaglio', filename }); UI.toast('Foto salvata'); this.step = 'confirm'; this.renderStep(); }
        });
        document.getElementById('btn-skip-photo').addEventListener('click', () => { this.obs.photo_id = null; this.step = 'confirm'; this.renderStep(); });
    },
    async renderConfirm(container) {
        UI.setTitle('Conferma');
        const previewText = formatObservationText(this.obs);
        let html = `<div class="wizard-header"><div class="wizard-title">Riepilogo Osservazione</div><div class="wizard-subtitle">${this.roomName}</div></div>`;
        html += `<div class="preview-box">${previewText || 'Osservazione vuota'}</div>`;
        html += '<div class="section"><div class="section-body">';
        html += `<div class="cell" style="cursor:default"><div class="cell-body"><div class="cell-subtitle">Elemento</div><div class="cell-title">${this.obs.wall || this.obs.element}</div></div></div>`;
        if (this.obs.position) html += `<div class="cell" style="cursor:default"><div class="cell-body"><div class="cell-subtitle">Posizione</div><div class="cell-title">${this.obs.position}</div></div></div>`;
        html += `<div class="cell" style="cursor:default"><div class="cell-body"><div class="cell-subtitle">Fenomeno</div><div class="cell-title">${this.obs.phenomenon}</div></div></div>`;
        if (this.obs.attributes.length > 0) html += `<div class="cell" style="cursor:default"><div class="cell-body"><div class="cell-subtitle">Attributi</div><div class="cell-title">${this.obs.attributes.join(', ')}</div></div></div>`;
        if (this.obs.notes) html += `<div class="cell" style="cursor:default"><div class="cell-body"><div class="cell-subtitle">Note</div><div class="cell-title">${this.obs.notes}</div></div></div>`;
        html += `<div class="cell" style="cursor:default"><div class="cell-body"><div class="cell-subtitle">Foto</div><div class="cell-title">${this.obs.photo_id ? 'Si' : 'No'}</div></div></div>`;
        html += '</div></div>';
        if (this.obs.photo_id) { const thumbUrl = await Photos.getThumbnailUrl(this.obs.photo_id); if (thumbUrl) html += `<div class="px-16"><img src="${thumbUrl}" style="width:120px; border-radius:8px;" alt="Foto dettaglio"></div>`; }
        html += '<div class="px-16 py-12 flex-col gap-8"><button class="btn btn-primary" id="btn-save-obs">Salva Osservazione</button><button class="btn btn-outline" id="btn-save-and-new">Salva e Nuova Osservazione</button><button class="btn btn-secondary" id="btn-cancel-obs">Annulla</button></div><div style="height: 32px;"></div>';
        container.innerHTML = html;
        document.getElementById('btn-save-obs').addEventListener('click', async () => { await this.saveObservation(); App.navigate(`rooms/${this.sopId}/${encodeURIComponent(this.roomName)}`); });
        document.getElementById('btn-save-and-new').addEventListener('click', async () => { await this.saveObservation(); this.step = 'element'; this.obs = { element: null, wall: null, position: null, phenomenon: null, attributes: [], notes: '', photo_id: null, infisso_type: null, infisso_wall: null, infisso_which: null, infisso_sub_pos: null }; this.renderStep(); });
        document.getElementById('btn-cancel-obs').addEventListener('click', () => { App.navigate(`rooms/${this.sopId}/${encodeURIComponent(this.roomName)}`); });
    },
    async saveObservation() {
        await Events.dispatch('add_observation', this.sopId, { room_name: this.roomName, element: this.obs.element, wall: this.obs.wall, position: this.obs.position, phenomenon: this.obs.phenomenon, attributes: this.obs.attributes, notes: this.obs.notes, photo_id: this.obs.photo_id, infisso_type: this.obs.infisso_type, infisso_wall: this.obs.infisso_wall, infisso_which: this.obs.infisso_which, infisso_sub_pos: this.obs.infisso_sub_pos });
        UI.toast('Osservazione salvata');
    }
};
</script>

<script>
// ==================== REVIEW VIEW ====================
const ReviewView = {
    sopId: null,
    async render(container, params) {
        this.sopId = params[0];
        if (!this.sopId) { App.navigate('home', true); return; }
        const sop = await DB.getSopralluogo(this.sopId);
        if (!sop) { App.navigate('home', true); return; }
        UI.setTitle('Riepilogo');
        const rooms = sop.rooms || {}; const roomNames = Object.keys(rooms);
        let html = `<div class="section"><div class="section-body"><div class="cell" style="cursor:default"><div class="cell-body"><div class="cell-title">${sop.building_code} - ${sop.unit_name || sop.unit_type}</div><div class="cell-subtitle">${sop.building_address || ''} | ${sop.floor} | ${sop.stair}</div></div></div></div></div>`;
        if (sop.owner) {
            const ownerText = sop.owner.type === 'persona' ? (sop.owner.name || '-') : `${sop.owner.company_name || '-'} (${sop.owner.company_admin || '-'})`;
            html += `<div class="section"><div class="section-header">PROPRIETARIO</div><div class="section-body"><div class="cell" style="cursor:default"><div class="cell-body"><div class="cell-title">${ownerText}</div></div></div></div></div>`;
        }
        let totalObs = 0, totalPhotos = 0;
        for (const name of roomNames) { totalObs += (rooms[name].observations || []).length; totalPhotos += (rooms[name].photos || []).length; }
        html += `<div class="section"><div class="section-header">STATISTICHE</div><div class="section-body"><div class="cell" style="cursor:default"><div class="cell-body"><div class="cell-title">Vani: ${roomNames.length} | Osservazioni: ${totalObs} | Foto: ${totalPhotos}</div></div></div></div></div>`;
        for (const roomName of roomNames) {
            const room = rooms[roomName]; const observations = room.observations || [];
            let roomHtml = `<div class="cell" style="cursor:default"><div class="cell-body"><div class="cell-title">${roomName} ${UI.statusBadge(room.status)}</div><div class="cell-subtitle">Soffitto: ${room.finishes || '-'} | Osservazioni: ${observations.length}</div></div></div>`;
            html += UI.section(roomName.toUpperCase(), roomHtml);
            if (observations.length > 0) { for (let i = 0; i < observations.length; i++) { const obs = observations[i]; const text = formatObservationText(obs); const photoLabel = obs.photo_id ? ' (V.F.)' : ''; html += `<div class="obs-card"><div class="obs-card-element">${obs.element}${obs.wall ? ' ' + obs.wall : ''}</div><div class="obs-card-text">${text}${photoLabel};</div></div>`; } }
            else html += '<div class="text-center text-hint py-12">Nessuna osservazione</div>';
        }
        html += '<div class="section"><div class="section-header">PREVIEW VERBALE</div></div>';
        html += `<div class="preview-box" style="white-space:pre-wrap; font-style:normal; font-size:13px;">${this.generateVerbalePreview(sop)}</div>`;
        html += '<div class="px-16 py-12 flex-col gap-8"><button class="btn btn-primary" id="btn-sync-report">Sincronizza e Genera Report</button><button class="btn btn-outline" id="btn-export-json">Esporta JSON</button><button class="btn btn-secondary" id="btn-back-rooms">Torna ai Vani</button></div><div style="height: 32px;"></div>';
        container.innerHTML = html;
        document.getElementById('btn-sync-report').addEventListener('click', async () => { if (!Sync.isOnline()) { UI.toast('Sei offline. Connettiti per sincronizzare.'); return; } await Sync.sendToBot(this.sopId); });
        document.getElementById('btn-export-json').addEventListener('click', async () => { await this.exportJSON(sop); });
        document.getElementById('btn-back-rooms').addEventListener('click', () => { App.navigate(`rooms/${this.sopId}`); });
    },
    generateVerbalePreview(sop) {
        const rooms = sop.rooms || {}; const roomNames = Object.keys(rooms); let lines = [];
        lines.push('VERBALE DI SOPRALLUOGO'); lines.push(`Fabbricato: ${sop.building_code} - ${sop.building_address || ''}`); lines.push(`Piano: ${sop.floor} | Scala: ${sop.stair}`); lines.push(`Unit\u00e0: ${sop.unit_name || sop.unit_type}`); lines.push('');
        if (sop.owner) { if (sop.owner.type === 'persona') lines.push(`Proprietario: ${sop.owner.name || '-'}`); else { lines.push(`Societ\u00e0: ${sop.owner.company_name || '-'}`); lines.push(`Amministratore: ${sop.owner.company_admin || '-'}`); } lines.push(''); }
        for (const roomName of roomNames) {
            const room = rooms[roomName]; lines.push(`--- ${roomName} ---`); lines.push(`Soffitto: ${room.finishes || '-'}`);
            if (room.status !== 'accessible') lines.push(`NOTA: ${CONFIG.ROOM_STATUS_LABELS[room.status] || room.status}`);
            const observations = room.observations || [];
            if (observations.length === 0) lines.push('Nessuna osservazione.');
            else { for (let i = 0; i < observations.length; i++) { const obs = observations[i]; const text = formatObservationText(obs); const photoRef = obs.photo_id ? ` (V.F. ${i + 1})` : ''; lines.push(`${text}${photoRef};`); } }
            lines.push('');
        }
        return lines.join('\n');
    },
    async exportJSON(sop) {
        const events = await DB.getEventsBySopralluogo(sop.id);
        const exportData = { sopralluogo: sop, events, exported_at: new Date().toISOString() };
        const json = JSON.stringify(exportData, null, 2);
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = `testimoniale_${sop.building_code}_${sop.subalterno || ''}_${Date.now()}.json`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
        UI.toast('JSON esportato');
    }
};

// ==================== ARCHIVE VIEW ====================
const ArchiveView = {
    async render(container) {
        UI.setTitle('Archivio');
        const sopralluoghi = await DB.getAllSopralluoghi();
        let html = '<div class="form-group"><input class="form-input" type="text" id="archive-search" placeholder="Cerca per codice fabbricato..."></div>';
        if (sopralluoghi.length === 0) html += UI.emptyState('\uD83D\uDCE6', 'Archivio vuoto', 'I sopralluoghi completati appariranno qui');
        else html += '<div id="archive-list">' + this.renderList(sopralluoghi) + '</div>';
        container.innerHTML = html;
        document.getElementById('archive-search')?.addEventListener('input', (e) => {
            const query = e.target.value.trim().toUpperCase();
            const filtered = query ? sopralluoghi.filter((s) => (s.building_code || '').toUpperCase().includes(query) || (s.unit_name || '').toUpperCase().includes(query) || (s.building_address || '').toUpperCase().includes(query)) : sopralluoghi;
            document.getElementById('archive-list').innerHTML = this.renderList(filtered);
            this.bindListEvents();
        });
        this.bindListEvents();
    },
    renderList(sopralluoghi) {
        if (sopralluoghi.length === 0) return '<div class="text-center text-hint py-12">Nessun risultato</div>';
        let cells = '';
        for (const sop of sopralluoghi) {
            const roomCount = Object.keys(sop.rooms || {}).length; const date = sop.created_at ? new Date(sop.created_at).toLocaleDateString('it-IT') : '-';
            cells += UI.cell({ icon: sop.synced ? '\u2601\uFE0F' : '\uD83D\uDCF1', title: `${sop.building_code} - ${sop.unit_name || sop.unit_type || ''}`, subtitle: `${sop.floor || ''} | ${roomCount} vani | ${date}`, dataId: sop.id });
        }
        return `<div class="section"><div class="section-body">${cells}</div></div>`;
    },
    bindListEvents() { document.querySelectorAll('#archive-list .cell[data-id]').forEach((cell) => { cell.addEventListener('click', () => { App.navigate(`review/${cell.dataset.id}`); }); }); }
};

// ==================== APP ROUTER ====================
const App = {
    currentView: null, currentParams: {},
    routes: { 'home': HomeView, 'setup': SetupView, 'anagrafica': AnagraficaView, 'rooms': RoomsView, 'room': RoomsView, 'wizard': WizardView, 'review': ReviewView, 'archive': ArchiveView },
    async init() {
        if (window.Telegram && Telegram.WebApp) { Telegram.WebApp.ready(); Telegram.WebApp.expand(); try { Telegram.WebApp.setHeaderColor('secondary_bg_color'); } catch (e) {} }
        await DB.open();
        Sync.init();
        window.addEventListener('hashchange', () => this.handleRoute());
        if (window.Telegram && Telegram.WebApp) { Telegram.WebApp.BackButton.onClick(() => { if (window.history.length > 1) window.history.back(); else this.navigate('home'); }); }
        if (!location.hash || location.hash === '#') this.navigate('home'); else this.handleRoute();
    },
    navigate(route, replace = false) { if (replace) location.replace('#' + route); else location.hash = route; },
    handleRoute() {
        const hash = location.hash.slice(1) || 'home'; const parts = hash.split('/'); const viewName = parts[0]; const params = parts.slice(1);
        const ViewModule = this.routes[viewName]; if (!ViewModule) { this.navigate('home', true); return; }
        if (window.Telegram && Telegram.WebApp) { if (viewName === 'home') Telegram.WebApp.BackButton.hide(); else Telegram.WebApp.BackButton.show(); }
        UI.showBack(viewName !== 'home');
        this.currentView = viewName; this.currentParams = params;
        const content = document.getElementById('app-content'); content.scrollTop = 0;
        ViewModule.render(content, params);
    },
    getSopralluogoId() { return this.currentParams[0] || null; }
};

document.addEventListener('DOMContentLoaded', () => { App.init().catch((e) => console.error('App init error:', e)); });
</script>
</body>
</html>
