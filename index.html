<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Testimoniale Metro C</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
    --bg: var(--tg-theme-bg-color, #ffffff);
    --text: var(--tg-theme-text-color, #000000);
    --hint: var(--tg-theme-hint-color, #999999);
    --link: var(--tg-theme-link-color, #2481cc);
    --btn: var(--tg-theme-button-color, #2481cc);
    --btn-text: var(--tg-theme-button-text-color, #ffffff);
    --secondary-bg: var(--tg-theme-secondary-bg-color, #f0f0f0);
    --section-bg: var(--tg-theme-section-bg-color, #ffffff);
    --section-header: var(--tg-theme-section-header-text-color, #6d6d72);
    --separator: var(--tg-theme-section-separator-color, #e0e0e0);
    --destructive: var(--tg-theme-destructive-text-color, #ff3b30);
    --radius: 12px;
    --radius-sm: 8px;
    --header-h: 52px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
}
html, body { height: 100%; overflow: hidden; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    font-size: 15px; line-height: 1.4;
    background-color: var(--secondary-bg); color: var(--text);
    display: flex; flex-direction: column;
    -webkit-tap-highlight-color: transparent;
}
#app-header {
    display: flex; align-items: center; height: var(--header-h);
    padding: 0 12px; background: var(--bg);
    border-bottom: 0.5px solid var(--separator); flex-shrink: 0; z-index: 100;
}
#header-title {
    flex: 1; font-size: 17px; font-weight: 600; text-align: center;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.header-btn {
    background: none; border: none; color: var(--link); cursor: pointer;
    padding: 8px; display: flex; align-items: center; justify-content: center; min-width: 40px;
}
.sync-dot { width: 10px; height: 10px; border-radius: 50%; min-width: 10px; margin-left: 8px; }
.sync-dot.online { background: #34c759; }
.sync-dot.offline { background: #ff9500; }
.sync-dot.syncing { background: #007aff; animation: pulse 1s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
#app-content {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    -webkit-overflow-scrolling: touch; padding-bottom: var(--safe-bottom);
}
.section { margin: 16px 0; }
.section-header {
    font-size: 13px; font-weight: 400; color: var(--section-header);
    text-transform: uppercase; padding: 0 16px 8px;
}
.section-body {
    background: var(--section-bg);
    border-top: 0.5px solid var(--separator); border-bottom: 0.5px solid var(--separator);
}
.cell {
    display: flex; align-items: center; padding: 12px 16px; min-height: 44px;
    cursor: pointer; transition: background 0.15s; position: relative;
}
.cell:active { background: var(--secondary-bg); }
.cell + .cell { border-top: 0.5px solid var(--separator); margin-left: 16px; padding-left: 0; }
.cell-icon {
    width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; margin-right: 12px; flex-shrink: 0;
}
.cell-body { flex: 1; min-width: 0; }
.cell-title { font-size: 15px; font-weight: 400; }
.cell-subtitle { font-size: 13px; color: var(--hint); margin-top: 2px; }
.cell-chevron { color: var(--hint); margin-left: 8px; flex-shrink: 0; }
.cell-badge {
    background: var(--btn); color: var(--btn-text); font-size: 12px; font-weight: 600;
    padding: 2px 8px; border-radius: 10px; margin-left: 8px;
}
.btn {
    display: flex; align-items: center; justify-content: center; width: 100%;
    padding: 14px 20px; border: none; border-radius: var(--radius);
    font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.15s;
}
.btn:active { opacity: 0.7; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary { background: var(--btn); color: var(--btn-text); }
.btn-secondary { background: var(--secondary-bg); color: var(--text); }
.btn-destructive { background: transparent; color: var(--destructive); }
.btn-outline { background: transparent; border: 1.5px solid var(--btn); color: var(--btn); }
.btn-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 12px 16px; }
.btn-grid-3 { grid-template-columns: repeat(3, 1fr); }
.btn-grid .btn-choice {
    padding: 12px 8px; border: 1.5px solid var(--separator); border-radius: var(--radius-sm);
    background: var(--section-bg); color: var(--text); font-size: 14px; font-weight: 500;
    text-align: center; cursor: pointer; transition: all 0.15s; word-break: break-word;
}
.btn-choice:active, .btn-choice.selected {
    background: var(--btn); color: var(--btn-text); border-color: var(--btn);
}
.btn-choice.completed { border-color: #34c759; position: relative; }
.btn-choice.completed::after {
    content: '\2713'; position: absolute; top: 4px; right: 6px; font-size: 11px; color: #34c759;
}
.form-group { padding: 12px 16px; }
.form-label { display: block; font-size: 13px; color: var(--section-header); text-transform: uppercase; margin-bottom: 8px; }
.form-input {
    width: 100%; padding: 12px; border: 1.5px solid var(--separator); border-radius: var(--radius-sm);
    background: var(--section-bg); color: var(--text); font-size: 16px; font-family: inherit;
    outline: none; transition: border-color 0.15s;
}
.form-input:focus { border-color: var(--btn); }
.form-input::placeholder { color: var(--hint); }
textarea.form-input { resize: vertical; min-height: 80px; }
.stepper { display: flex; align-items: center; justify-content: center; padding: 12px 16px; gap: 4px; }
.stepper-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--separator); transition: all 0.2s; }
.stepper-dot.active { background: var(--btn); width: 24px; border-radius: 4px; }
.stepper-dot.done { background: #34c759; }
.menu-group { margin: 8px 0; }
.menu-group-title { font-size: 13px; font-weight: 600; color: var(--section-header); padding: 8px 16px 4px; }
.menu-group-items { display: flex; flex-wrap: wrap; gap: 6px; padding: 4px 16px 8px; }
.menu-chip {
    padding: 8px 14px; border: 1px solid var(--separator); border-radius: 20px;
    background: var(--section-bg); color: var(--text); font-size: 13px;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.menu-chip:active, .menu-chip.selected { background: var(--btn); color: var(--btn-text); border-color: var(--btn); }
.menu-chip.check { padding-left: 12px; }
.menu-chip.check.selected::before { content: '\2713 '; }
.photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; padding: 8px 16px; }
.photo-thumb { aspect-ratio: 1; border-radius: var(--radius-sm); overflow: hidden; position: relative; cursor: pointer; }
.photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
.photo-add {
    display: flex; align-items: center; justify-content: center; background: var(--secondary-bg);
    border: 2px dashed var(--separator); border-radius: var(--radius-sm); aspect-ratio: 1;
    cursor: pointer; color: var(--hint); font-size: 28px;
}
.photo-add:active { opacity: 0.6; }
.obs-card { background: var(--section-bg); border-radius: var(--radius-sm); padding: 12px; margin: 6px 16px; border-left: 3px solid var(--btn); }
.obs-card-element { font-size: 12px; font-weight: 600; color: var(--link); text-transform: uppercase; margin-bottom: 4px; }
.obs-card-text { font-size: 14px; line-height: 1.4; }
.obs-card-photo { font-size: 12px; color: var(--hint); margin-top: 4px; }
.status-badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; }
.status-accessible { background: #e8f5e9; color: #2e7d32; }
.status-non_accessibile { background: #fff3e0; color: #e65100; }
.status-non_valutabile { background: #fce4ec; color: #c62828; }
.status-non_autorizzato { background: #f3e5f5; color: #6a1b9a; }
.status-completed { background: #e8f5e9; color: #2e7d32; }
.status-in_progress { background: #e3f2fd; color: #1565c0; }
.toast {
    position: fixed; bottom: calc(20px + var(--safe-bottom)); left: 50%; transform: translateX(-50%);
    background: var(--text); color: var(--bg); padding: 10px 20px; border-radius: 20px;
    font-size: 14px; font-weight: 500; z-index: 1000; transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
}
.toast.hidden { opacity: 0; transform: translateX(-50%) translateY(20px); }
.modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 500;
    display: flex; align-items: flex-end; justify-content: center;
}
.modal-overlay.hidden { display: none; }
.modal-content {
    background: var(--bg); border-radius: var(--radius) var(--radius) 0 0;
    width: 100%; max-width: 500px; max-height: 80vh; overflow-y: auto;
    padding: 20px 16px calc(20px + var(--safe-bottom)); animation: slideUp 0.25s ease-out;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-title { font-size: 18px; font-weight: 600; text-align: center; margin-bottom: 16px; }
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 32px; text-align: center; }
.empty-state-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
.empty-state-title { font-size: 17px; font-weight: 600; margin-bottom: 8px; }
.empty-state-text { font-size: 14px; color: var(--hint); }
.hidden { display: none !important; }
.px-16 { padding-left: 16px; padding-right: 16px; }
.py-12 { padding-top: 12px; padding-bottom: 12px; }
.mt-8 { margin-top: 8px; }
.mt-16 { margin-top: 16px; }
.mb-8 { margin-bottom: 8px; }
.mb-16 { margin-bottom: 16px; }
.text-center { text-align: center; }
.text-hint { color: var(--hint); font-size: 13px; }
.text-link { color: var(--link); }
.gap-8 { gap: 8px; }
.flex-col { display: flex; flex-direction: column; }
.wizard-header { padding: 16px; text-align: center; }
.wizard-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.wizard-subtitle { font-size: 13px; color: var(--hint); }
.preview-box {
    background: var(--secondary-bg); border-radius: var(--radius-sm); padding: 12px 16px;
    margin: 8px 16px; font-size: 14px; line-height: 1.5; font-style: italic;
    color: var(--text); border-left: 3px solid var(--link);
}
#app-content::-webkit-scrollbar { width: 0; }
.phase-tabs { display: flex; background: var(--section-bg); border-bottom: 0.5px solid var(--separator); }
.phase-tab {
    flex: 1; padding: 10px; text-align: center; font-size: 13px; font-weight: 500;
    color: var(--hint); border: none; background: none; cursor: pointer;
    border-bottom: 2px solid transparent; transition: all 0.2s;
}
.phase-tab.active { color: var(--btn); border-bottom-color: var(--btn); }
    </style>
</head>
<body>
    <!-- Header -->
    <div id="app-header">
        <button class="header-btn hidden" id="btn-back" onclick="history.back()">&#8249;</button>
        <div id="header-title">Testimoniale</div>
        <div class="sync-dot offline" id="sync-indicator" title="Offline"></div>
    </div>

    <!-- Main Content -->
    <div id="app-content"></div>

    <!-- Toast -->
    <div class="toast hidden" id="toast"></div>

    <!-- Modal -->
    <div class="modal-overlay hidden" id="modal-overlay">
        <div class="modal-content" id="modal-content"></div>
    </div>

<script>
// ==================== CONFIG ====================
const CONFIG = {
    UNIT_TYPES: ['Abitazione', 'Ufficio', 'Negozio', 'Garage', 'Cantina', 'Soffitta', 'Parti Comuni'],
    ROOM_TYPES: ['INGRESSO', 'STANZA', 'DISIMPEGNO', 'CORRIDOIO', 'BAGNO', 'SOGGIORNO', 'SALONE', 'CUCINA', 'DEPOSITO', 'UFFICIO'],
    CEIL_TYPES: ['Controsoffitto', 'Niente'],
    ELEMENTS: ['Parete', 'Soffitto', 'Pavimento', 'Infisso', 'Balcone', 'Cornice'],
    REQUIRED_SURFACES: ['Parete A', 'Parete B', 'Parete C', 'Parete D', 'Soffitto', 'Pavimento'],
    WALL_LABELS: ['Parete A', 'Parete B', 'Parete C', 'Parete D'],
    FLOORS: ['Interrato', 'Piano Terra', 'Piano 1', 'Piano 2', 'Piano 3', 'Piano 4', 'Piano 5', 'Copertura'],
    STAIRS: ['Scala A', 'Scala B', 'Scala C', 'Scala D', 'Scala Unica'],
    PRE_CHECK: ['NDR', 'INGOMBRA', 'PROCEDI'],
    POS_WALL_MENUS: {
        'LOCALIZZAZIONE DIRETTA': ['a DX', 'a SX', 'al centro', 'nella parte apicale', 'nella parte apicale a DX', 'nella parte apicale a SX', 'al piede', 'al piede a DX', 'al piede a SX'],
        'DIEDRI (DD)': ['a partire da DD alto DX', 'a partire da DD alto SX', 'a partire da DD basso DX', 'a partire da DD basso SX', 'a partire da DD (Generico) VT', 'a partire da DD (Generico) OZ', 'in corrispondenza DD'],
        'APERTURE / PTB': ['al di sopra PTB', 'a partire da PTB', 'PTB varco di passaggio al centro', 'PTB porta al centro', 'in corrispondenza varco di passaggio', 'in corrispondenza porta'],
        'ALTRI RIFERIMENTI': ['a partire da rivestimento', 'a partire da intradosso', 'a partire da travetto']
    },
    POS_CEIL: ['Intera Superficie', 'Porzione Lato SX', 'Porzione Lato DX', 'Centro', 'Centro Alto', 'Centro Basso', 'presso varco di passaggio'],
    POS_FLOOR: ['Intera Superficie', 'Porzione Lato SX', 'Porzione Lato DX', 'Centro', 'presso varco di passaggio', 'al centro del vano'],
    PHEN_WALL_MENUS: {
        'FESSURAZIONI SEMPLICI': ['Filatura', 'Filatura capillare', 'Filatura evidente', 'Filatura discontinua', 'Microlesione', 'Lesione', 'Lesione diagonale'],
        'FESSURAZIONI COMPOSTE': ['Serie di filature', 'Filatura OZ con ramificazioni VT', 'Filatura VT con ramificazioni OZ', 'Filatura pseudo VT con laminazione'],
        'PATOLOGIE': ['Macchia', 'Macchia di umidit\u00e0', 'Umidit\u00e0 con efflorescenza', 'Distacco', 'Distacco di intonaco', 'Esfoliazione d\'intonaco', 'Gonfiamento', 'Scrostatura'],
        'DANNI PUNTUALI / ALTRO': ['Mancanza', 'Lacuna di materiale', 'Efflorescenza', 'Colonizzazione biologica', 'Non Visibile', 'NESSUN DIFETTO']
    },
    PHEN_CEIL: ['NESSUN DIFETTO', 'Non Visibile', 'Macchia', 'Umidit\u00e0', 'Distacco', 'Lesione', 'Filatura', 'Gonfiamento', 'Distacco di intonaco', 'Esfoliazione d\'intonaco'],
    PHEN_FLOOR: ['NESSUN DIFETTO', 'Non Visibile', 'Distacco', 'Rottura', 'Macchia', 'Filatura', 'Avvallamento', 'Lacuna di materiale'],
    PHEN_INFISSO: ['NESSUN DIFETTO', 'Non Visibile', 'Filatura', 'Mancanza', 'Non Funzionante', 'Rotta', 'Vetro incrinato', 'Telaio degradato'],
    PHEN_GENERIC: ['NESSUN DIFETTO', 'Non Visibile', 'Distacco', 'Rottura', 'Macchia'],
    INFISSO_TYPES: ['finestra', 'porta finestra', 'porta interna', 'porta ingresso', 'apertura', 'apertura ad arco', 'lucernario'],
    INFISSO_DETAILS: ['Soglia', 'Intradosso', 'Stipite DX', 'Stipite SX', 'Anta', 'Vetro', 'Telaio', 'Davanzale', 'Cassonetto', 'Imbotte'],
    POS_GENERIC: ['Intera Superficie', 'Porzione'],
    ATTRIBUTES_MENUS: {
        'ORIENTAMENTO': ['VT (Verticale)', 'OZ (Orizzontale)', 'DG (Diagonale)', 'DG alto SX', 'DG alto DX', 'DG basso SX', 'DG basso DX', 'pseudo VT', 'pseudo OZ', 'trasversale', 'a tutta H', 'breve estensione'],
        'SPECIFICHE DIFETTO': ['Capillare', 'Passante', 'A Ragnatela', 'Evidente', 'Discontinua', 'Ultimo Tratto (UT)', 'Diedro (DD)', 'SX', 'DX', 'Alto', 'Basso', 'Vetro', 'Telaio']
    },
    ROOM_STATUSES: ['accessible', 'non_accessibile', 'non_valutabile', 'non_autorizzato'],
    ROOM_STATUS_LABELS: { accessible: 'Accessibile', non_accessibile: 'Non Accessibile', non_valutabile: 'Non Valutabile', non_autorizzato: 'Non Autorizzato' },
    getPositions(element) {
        switch (element) {
            case 'Parete': return null;
            case 'Soffitto': return this.POS_CEIL;
            case 'Pavimento': return this.POS_FLOOR;
            case 'Infisso': return this.WALL_LABELS;
            case 'Balcone': case 'Cornice': return this.POS_GENERIC;
            default: return this.POS_GENERIC;
        }
    },
    getPhenomena(element) {
        switch (element) {
            case 'Parete': return null;
            case 'Soffitto': return this.PHEN_CEIL;
            case 'Pavimento': return this.PHEN_FLOOR;
            case 'Infisso': return this.PHEN_INFISSO;
            case 'Balcone': case 'Cornice': return this.PHEN_GENERIC;
            default: return this.PHEN_GENERIC;
        }
    }
};

// ==================== DB ====================
const DB = {
    _db: null, DB_NAME: 'testimoniale_db', DB_VERSION: 1,
    async open() {
        if (this._db) return this._db;
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(this.DB_NAME, this.DB_VERSION);
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains('events')) {
                    const evStore = db.createObjectStore('events', { keyPath: 'id', autoIncrement: true });
                    evStore.createIndex('sopralluogo_id', 'sopralluogo_id', { unique: false });
                    evStore.createIndex('type', 'type', { unique: false });
                    evStore.createIndex('timestamp', 'timestamp', { unique: false });
                }
                if (!db.objectStoreNames.contains('sopralluoghi')) {
                    const sopStore = db.createObjectStore('sopralluoghi', { keyPath: 'id' });
                    sopStore.createIndex('building_code', 'building_code', { unique: false });
                    sopStore.createIndex('synced', 'synced', { unique: false });
                    sopStore.createIndex('created_at', 'created_at', { unique: false });
                }
                if (!db.objectStoreNames.contains('photos')) {
                    const photoStore = db.createObjectStore('photos', { keyPath: 'id' });
                    photoStore.createIndex('sopralluogo_id', 'sopralluogo_id', { unique: false });
                    photoStore.createIndex('room_name', 'room_name', { unique: false });
                    photoStore.createIndex('type', 'type', { unique: false });
                    photoStore.createIndex('synced', 'synced', { unique: false });
                }
            };
            request.onsuccess = (e) => { this._db = e.target.result; resolve(this._db); };
            request.onerror = (e) => { console.error('IndexedDB open error:', e.target.error); reject(e.target.error); };
        });
    },
    _tx(storeName, mode = 'readonly') { return this._db.transaction(storeName, mode).objectStore(storeName); },
    async add(storeName, data) {
        await this.open();
        return new Promise((resolve, reject) => {
            const store = this._db.transaction(storeName, 'readwrite').objectStore(storeName);
            const r = store.add(data); r.onsuccess = () => resolve(r.result); r.onerror = () => reject(r.error);
        });
    },
    async put(storeName, data) {
        await this.open();
        return new Promise((resolve, reject) => {
            const store = this._db.transaction(storeName, 'readwrite').objectStore(storeName);
            const r = store.put(data); r.onsuccess = () => resolve(r.result); r.onerror = () => reject(r.error);
        });
    },
    async get(storeName, key) {
        await this.open();
        return new Promise((resolve, reject) => {
            const r = this._tx(storeName).get(key); r.onsuccess = () => resolve(r.result); r.onerror = () => reject(r.error);
        });
    },
    async getAll(storeName) {
        await this.open();
        return new Promise((resolve, reject) => {
            const r = this._tx(storeName).getAll(); r.onsuccess = () => resolve(r.result); r.onerror = () => reject(r.error);
        });
    },
    async delete(storeName, key) {
        await this.open();
        return new Promise((resolve, reject) => {
            const store = this._db.transaction(storeName, 'readwrite').objectStore(storeName);
            const r = store.delete(key); r.onsuccess = () => resolve(); r.onerror = () => reject(r.error);
        });
    },
    async getByIndex(storeName, indexName, value) {
        await this.open();
        return new Promise((resolve, reject) => {
            const r = this._tx(storeName).index(indexName).getAll(value);
            r.onsuccess = () => resolve(r.result); r.onerror = () => reject(r.error);
        });
    },
    async getSopralluogo(id) { return this.get('sopralluoghi', id); },
    async getAllSopralluoghi() { const all = await this.getAll('sopralluoghi'); return all.sort((a, b) => (b.created_at || 0) - (a.created_at || 0)); },
    async saveSopralluogo(data) { data.updated_at = Date.now(); return this.put('sopralluoghi', data); },
    async deleteSopralluogo(id) {
        const events = await this.getByIndex('events', 'sopralluogo_id', id);
        const photos = await this.getByIndex('photos', 'sopralluogo_id', id);
        const tx = this._db.transaction(['sopralluoghi', 'events', 'photos'], 'readwrite');
        tx.objectStore('sopralluoghi').delete(id);
        for (const ev of events) tx.objectStore('events').delete(ev.id);
        for (const ph of photos) tx.objectStore('photos').delete(ph.id);
        return new Promise((resolve, reject) => { tx.oncomplete = resolve; tx.onerror = () => reject(tx.error); });
    },
    async addEvent(event) { return this.add('events', event); },
    async getEventsBySopralluogo(sopralluogoId) { const events = await this.getByIndex('events', 'sopralluogo_id', sopralluogoId); return events.sort((a, b) => a.timestamp - b.timestamp); },
    async addPhoto(photoData) { return this.put('photos', photoData); },
    async getPhoto(id) { return this.get('photos', id); },
    async getPhotosBySopralluogo(sopralluogoId) { return this.getByIndex('photos', 'sopralluogo_id', sopralluogoId); },
    async getPhotosByRoom(roomName) { return this.getByIndex('photos', 'room_name', roomName); }
};

// ==================== EVENTS ====================
const Events = {
    uuid() { return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, (c) => { const r = Math.random() * 16 | 0; return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16); }); },
    getUserId() { try { if (window.Telegram && Telegram.WebApp.initDataUnsafe && Telegram.WebApp.initDataUnsafe.user) return Telegram.WebApp.initDataUnsafe.user.id; } catch (e) {} return 0; },
    async dispatch(type, sopralluogoId, payload) {
        const event = { sopralluogo_id: sopralluogoId, type, timestamp: Date.now(), user_id: this.getUserId(), payload: payload || {}, synced: false };
        await DB.addEvent(event);
        await this.applyEvent(event);
        return event;
    },
    async applyEvent(event) {
        let sop = await DB.getSopralluogo(event.sopralluogo_id);
        if (!sop && event.type !== 'create_sopralluogo') { console.warn('Sopralluogo non trovato per evento:', event); return; }
        const p = event.payload;
        switch (event.type) {
            case 'create_sopralluogo':
                sop = { id: event.sopralluogo_id, building_code: p.building_code || '', building_address: p.building_address || '', floor: p.floor || '', stair: p.stair || '', unit_type: p.unit_type || '', subalterno: p.subalterno || '', unit_internal: p.unit_internal || '', unit_name: '', owner: null, attendees: { metro_tech: '', metro_coll: '', rm: '' }, phase: 1, rooms: {}, global_notes: '', planimetria_photo_id: null, created_at: event.timestamp, updated_at: event.timestamp, synced: false };
                break;
            case 'update_setup': Object.assign(sop, p); break;
            case 'set_anagrafica':
                if (p.owner !== undefined) sop.owner = p.owner;
                if (p.attendees !== undefined) sop.attendees = { ...sop.attendees, ...p.attendees };
                break;
            case 'upload_planimetria': sop.planimetria_photo_id = p.photo_id; break;
            case 'complete_phase': sop.phase = p.phase; break;
            case 'add_vano':
                if (!sop.rooms[p.full_name]) sop.rooms[p.full_name] = { room_number: p.room_number, room_name: p.room_name, status: 'accessible', finishes: null, observations: [], photos: [] };
                break;
            case 'set_room_status': if (sop.rooms[p.room_name]) sop.rooms[p.room_name].status = p.status; break;
            case 'set_room_finishes': if (sop.rooms[p.room_name]) sop.rooms[p.room_name].finishes = p.ceiling_type; break;
            case 'add_observation':
                if (sop.rooms[p.room_name]) sop.rooms[p.room_name].observations.push({ element: p.element, wall: p.wall || null, position: p.position || null, phenomenon: p.phenomenon, attributes: p.attributes || [], notes: p.notes || '', photo_id: p.photo_id || null, infisso_type: p.infisso_type || null, infisso_wall: p.infisso_wall || null, infisso_which: p.infisso_which || null, infisso_sub_pos: p.infisso_sub_pos || null, timestamp: event.timestamp });
                break;
            case 'add_photo':
                if (sop.rooms[p.room_name]) sop.rooms[p.room_name].photos.push({ photo_id: p.photo_id, type: p.type, filename: p.filename });
                break;
            case 'set_room_ndr':
                if (sop.rooms[p.room_name]) sop.rooms[p.room_name].observations.push({ element: p.element, wall: p.wall || null, position: null, phenomenon: 'NDR', attributes: [], notes: '', photo_id: null, timestamp: event.timestamp });
                break;
            case 'set_room_ingombra':
                if (sop.rooms[p.room_name]) sop.rooms[p.room_name].observations.push({ element: p.element, wall: p.wall || null, position: null, phenomenon: 'INGOMBRA', attributes: [], notes: '', photo_id: null, timestamp: event.timestamp });
                break;
            case 'edit_observation':
                if (sop.rooms[p.room_name] && sop.rooms[p.room_name].observations[p.observation_index]) Object.assign(sop.rooms[p.room_name].observations[p.observation_index], p.changes);
                break;
            case 'delete_observation': if (sop.rooms[p.room_name]) sop.rooms[p.room_name].observations.splice(p.observation_index, 1); break;
            case 'add_global_note': sop.global_notes = (sop.global_notes || '') + '\n' + p.note_text; break;
            case 'request_report': sop.report_requested = true; break;
        }
        sop.updated_at = event.timestamp;
        sop.synced = false;
        await DB.saveSopralluogo(sop);
    },
    async replayEvents(sopralluogoId) {
        const events = await DB.getEventsBySopralluogo(sopralluogoId);
        await DB.delete('sopralluoghi', sopralluogoId);
        for (const event of events) await this.applyEvent(event);
        return DB.getSopralluogo(sopralluogoId);
    },
    async createSopralluogo(data) { const id = this.uuid(); await this.dispatch('create_sopralluogo', id, data); return id; }
};

// ==================== PHOTOS ====================
const Photos = {
    MAX_WIDTH: 1920, MAX_HEIGHT: 1920, THUMB_SIZE: 200, QUALITY: 0.85,
    capture(acceptType = 'image/*') {
        return new Promise((resolve) => {
            const input = document.createElement('input');
            input.type = 'file'; input.accept = acceptType; input.capture = 'environment';
            input.onchange = async () => {
                if (!input.files || !input.files[0]) { resolve(null); return; }
                const file = input.files[0];
                try {
                    const resized = await this.resizeImage(file, this.MAX_WIDTH, this.MAX_HEIGHT, this.QUALITY);
                    const thumbnail = await this.resizeImage(file, this.THUMB_SIZE, this.THUMB_SIZE, 0.6);
                    resolve({ blob: resized, thumbnail });
                } catch (e) { console.error('Errore resize foto:', e); resolve({ blob: file, thumbnail: file }); }
            };
            input.addEventListener('cancel', () => resolve(null));
            input.click();
        });
    },
    resizeImage(file, maxW, maxH, quality) {
        return new Promise((resolve, reject) => {
            const img = new Image(); const url = URL.createObjectURL(file);
            img.onload = () => {
                URL.revokeObjectURL(url);
                let w = img.width, h = img.height;
                if (w > maxW || h > maxH) { const ratio = Math.min(maxW / w, maxH / h); w = Math.round(w * ratio); h = Math.round(h * ratio); }
                const canvas = document.createElement('canvas'); canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                canvas.toBlob((blob) => { if (blob) resolve(blob); else reject(new Error('Canvas toBlob failed')); }, 'image/jpeg', quality);
            };
            img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('Image load failed')); };
            img.src = url;
        });
    },
    async save(sopralluogoId, roomName, type, blob, thumbnail, observationKey = null) {
        const id = Events.uuid();
        const photoCount = (await DB.getPhotosByRoom(roomName)).filter((p) => p.type === type).length;
        const num = photoCount + 1;
        let filename;
        if (type === 'planimetria') filename = `planimetria_${Date.now()}.jpg`;
        else if (type === 'panoramica') filename = `FOTO_PANORAMICA_${num}.jpg`;
        else filename = `Foto_${num}_dettaglio.jpg`;
        const photoData = { id, sopralluogo_id: sopralluogoId, room_name: roomName, type, filename, blob, thumbnail, observation_key: observationKey, created_at: Date.now(), synced: false };
        await DB.addPhoto(photoData);
        return { id, filename };
    },
    async getThumbnailUrl(photoId) { const photo = await DB.getPhoto(photoId); if (!photo || !photo.thumbnail) return null; return URL.createObjectURL(photo.thumbnail); },
    async getFullUrl(photoId) { const photo = await DB.getPhoto(photoId); if (!photo || !photo.blob) return null; return URL.createObjectURL(photo.blob); }
};

// ==================== SYNC ====================
const Sync = {
    isOnline() { return navigator.onLine; },
    updateIndicator() {
        const dot = document.getElementById('sync-indicator');
        if (!dot) return;
        if (this.isOnline()) { dot.classList.remove('offline', 'syncing'); dot.classList.add('online'); dot.title = 'Online'; }
        else { dot.classList.remove('online', 'syncing'); dot.classList.add('offline'); dot.title = 'Offline'; }
    },
    init() { window.addEventListener('online', () => this.updateIndicator()); window.addEventListener('offline', () => this.updateIndicator()); this.updateIndicator(); },
    async sendToBot(sopralluogoId) {
        const sop = await DB.getSopralluogo(sopralluogoId);
        if (!sop) { UI.toast('Sopralluogo non trovato'); return false; }
        const payload = { action: 'sync_sopralluogo', sopralluogo: { id: sop.id, building_code: sop.building_code, building_address: sop.building_address, floor: sop.floor, stair: sop.stair, unit_type: sop.unit_type, subalterno: sop.subalterno, unit_internal: sop.unit_internal, unit_name: sop.unit_name, owner: sop.owner, attendees: sop.attendees, rooms: sop.rooms, global_notes: sop.global_notes } };
        const json = JSON.stringify(payload);
        if (json.length > 4096) return this.sendChunked(sopralluogoId, payload);
        try {
            if (window.Telegram && Telegram.WebApp) { Telegram.WebApp.sendData(json); sop.synced = true; await DB.saveSopralluogo(sop); UI.toast('Dati inviati al bot'); return true; }
            else { console.log('SYNC DATA:', json); UI.toast('Dati pronti (modalit\u00e0 test)'); return true; }
        } catch (e) { console.error('Errore sync:', e); UI.toast('Errore invio dati'); return false; }
    },
    async sendChunked(sopralluogoId, payload) {
        const sop = await DB.getSopralluogo(sopralluogoId);
        const rooms = sop.rooms; const roomNames = Object.keys(rooms);
        for (let i = 0; i < roomNames.length; i++) {
            const roomName = roomNames[i];
            const chunk = { action: 'sync_room', sopralluogo_id: sopralluogoId, room_index: i, total_rooms: roomNames.length, building_code: sop.building_code, floor: sop.floor, unit_name: sop.unit_name || `${sop.unit_type} - Sub. ${sop.subalterno} - ${sop.unit_internal}`, room_name: roomName, room_data: rooms[roomName], ...(i === 0 ? { owner: sop.owner, attendees: sop.attendees, global_notes: sop.global_notes } : {}) };
            const json = JSON.stringify(chunk);
            if (json.length > 4096) console.warn(`Vano ${roomName} troppo grande (${json.length} bytes)`);
            try { if (window.Telegram && Telegram.WebApp) Telegram.WebApp.sendData(json); } catch (e) { console.error(`Errore invio chunk ${i}:`, e); return false; }
        }
        sop.synced = true; await DB.saveSopralluogo(sop); UI.toast('Dati inviati al bot'); return true;
    },
    async requestReport(sopralluogoId) {
        const sop = await DB.getSopralluogo(sopralluogoId);
        if (!sop) return false;
        await Events.dispatch('request_report', sopralluogoId, {});
        const payload = { action: 'generate_report', sopralluogo_id: sopralluogoId, building_code: sop.building_code, floor: sop.floor, unit_name: sop.unit_name || `${sop.unit_type} - Sub. ${sop.subalterno} - ${sop.unit_internal}` };
        try {
            if (window.Telegram && Telegram.WebApp) { Telegram.WebApp.sendData(JSON.stringify(payload)); UI.toast('Richiesta report inviata'); return true; }
            else { console.log('REPORT REQUEST:', payload); UI.toast('Richiesta report (modalit\u00e0 test)'); return true; }
        } catch (e) { console.error('Errore richiesta report:', e); UI.toast('Errore richiesta report'); return false; }
    }
};

// ==================== UI COMPONENTS ====================
function formatObservationText(obs) {
    if (!obs || !obs.phenomenon) return '';
    if (obs.phenomenon === 'NDR' || obs.phenomenon === 'Nulla da Rilevare') { return `${obs.wall || obs.element} NDR (per quanto visibile)`; }
    if (obs.phenomenon === 'INGOMBRA') { return `${obs.wall || obs.element} ingombra`; }
    if (obs.phenomenon === 'NESSUN DIFETTO') { return `${obs.wall || obs.element} nessun difetto rilevato`; }
    let parts = [];
    parts.push(obs.wall || obs.element);
    if (obs.position) parts.push(obs.position);
    parts.push(obs.phenomenon);
    if (obs.attributes && obs.attributes.length > 0) {
        const attrText = obs.attributes.map((a) => a.replace(' (Verticale)', '').replace(' (Orizzontale)', '').replace(' (Diagonale)', '').replace('Ultimo Tratto ', '').replace('Diedro ', '')).join(', ');
        parts.push(`(${attrText})`);
    }
    if (obs.notes) parts.push(obs.notes);
    let text = parts.join(' ');
    return text.charAt(0).toUpperCase() + text.slice(1);
}

const UI = {
    toast(message, duration = 2500) { const el = document.getElementById('toast'); el.textContent = message; el.classList.remove('hidden'); clearTimeout(UI._toastTimer); UI._toastTimer = setTimeout(() => el.classList.add('hidden'), duration); },
    _toastTimer: null,
    showModal(html) { const overlay = document.getElementById('modal-overlay'); const content = document.getElementById('modal-content'); content.innerHTML = html; overlay.classList.remove('hidden'); overlay.onclick = (e) => { if (e.target === overlay) UI.hideModal(); }; },
    hideModal() { document.getElementById('modal-overlay').classList.add('hidden'); },
    setTitle(title) { document.getElementById('header-title').textContent = title; },
    showBack(show, onClick) { const btn = document.getElementById('btn-back'); if (show) { btn.classList.remove('hidden'); btn.onclick = onClick || (() => history.back()); } else { btn.classList.add('hidden'); btn.onclick = null; } },
    section(header, bodyHtml) { return `<div class="section">${header ? `<div class="section-header">${header}</div>` : ''}<div class="section-body">${bodyHtml}</div></div>`; },
    cell({ icon, title, subtitle, badge, chevron = true, dataId }) {
        const attrs = dataId ? `data-id="${dataId}"` : '';
        return `<div class="cell" ${attrs}>${icon ? `<div class="cell-icon">${icon}</div>` : ''}<div class="cell-body"><div class="cell-title">${title}</div>${subtitle ? `<div class="cell-subtitle">${subtitle}</div>` : ''}</div>${badge ? `<span class="cell-badge">${badge}</span>` : ''}${chevron ? '<span class="cell-chevron">&#8250;</span>' : ''}</div>`;
    },
    buttonGrid(items, options = {}) {
        const cols = options.cols === 3 ? 'btn-grid-3' : '';
        const buttons = items.map((item) => { const val = typeof item === 'string' ? item : item.value; const label = typeof item === 'string' ? item : item.label; const cls = item.className || ''; return `<button class="btn-choice ${cls}" data-value="${val}">${label}</button>`; }).join('');
        return `<div class="btn-grid ${cols}">${buttons}</div>`;
    },
    groupedMenu(groups, multiSelect = false) {
        let html = '';
        for (const [title, items] of Object.entries(groups)) {
            const chips = items.map((item) => `<button class="${multiSelect ? 'menu-chip check' : 'menu-chip'}" data-value="${item}">${item}</button>`).join('');
            html += `<div class="menu-group"><div class="menu-group-title">${title}</div><div class="menu-group-items">${chips}</div></div>`;
        }
        return html;
    },
    chipList(items, multiSelect = false) {
        const cls = multiSelect ? 'menu-chip check' : 'menu-chip';
        return `<div class="menu-group-items" style="padding: 8px 16px;">${items.map((item) => `<button class="${cls}" data-value="${item}">${item}</button>`).join('')}</div>`;
    },
    stepper(total, current) { let dots = ''; for (let i = 0; i < total; i++) { dots += `<div class="stepper-dot ${i < current ? 'done' : i === current ? 'active' : ''}"></div>`; } return `<div class="stepper">${dots}</div>`; },
    observationCard(obs, index) { return `<div class="obs-card" data-obs-index="${index}"><div class="obs-card-element">${obs.element}${obs.wall ? ' ' + obs.wall : ''}</div><div class="obs-card-text">${formatObservationText(obs)}</div><div class="obs-card-photo">${obs.photo_id ? 'Con foto' : 'Senza foto'}</div></div>`; },
    emptyState(icon, title, text) { return `<div class="empty-state"><div class="empty-state-icon">${icon}</div><div class="empty-state-title">${title}</div><div class="empty-state-text">${text}</div></div>`; },
    formInput({ label, placeholder, id, type = 'text', value = '' }) { return `<div class="form-group">${label ? `<label class="form-label" for="${id}">${label}</label>` : ''}<input class="form-input" type="${type}" id="${id}" placeholder="${placeholder || ''}" value="${value}"></div>`; },
    statusBadge(status) { const labels = { accessible: 'Accessibile', non_accessibile: 'Non Accessibile', non_valutabile: 'Non Valutabile', non_autorizzato: 'Non Autorizzato', completed: 'Completato', in_progress: 'In Corso' }; return `<span class="status-badge status-${status}">${labels[status] || status}</span>`; }
};
</script>

<!-- PART 2: Views and App Router loaded separately to avoid token limits -->
<script>
// ==================== HOME VIEW ====================
const HomeView = {
    async render(container) {
        UI.setTitle('Testimoniale');
        const sopralluoghi = await DB.getAllSopralluoghi();
        const inCorso = sopralluoghi.filter((s) => s.phase < 4);
        const completati = sopralluoghi.filter((s) => s.phase >= 4);
        let html = '<div class="px-16" style="padding-top: 16px;"><button class="btn btn-primary" id="btn-new-sop">Nuovo Testimoniale</button></div>';
        if (inCorso.length > 0) {
            let cells = '';
            for (const sop of inCorso) {
                const roomCount = Object.keys(sop.rooms || {}).length;
                const phaseName = sop.phase === 1 ? 'Setup' : sop.phase === 2 ? 'Ricognizione' : 'Analisi';
                cells += UI.cell({ icon: '\uD83C\uDFD7\uFE0F', title: `${sop.building_code} - ${sop.unit_type || ''}`, subtitle: `${sop.floor || ''} | ${sop.unit_internal || ''} | ${roomCount} vani | ${phaseName}`, badge: sop.synced ? null : 'Non sync', dataId: sop.id });
            }
            html += UI.section('IN CORSO', cells);
        }
        if (completati.length > 0) {
            let cells = '';
            for (const sop of completati) {
                const roomCount = Object.keys(sop.rooms || {}).length;
                cells += UI.cell({ icon: '\u2705', title: `${sop.building_code} - ${sop.unit_type || ''}`, subtitle: `${sop.floor || ''} | ${sop.unit_internal || ''} | ${roomCount} vani`, dataId: sop.id });
            }
            html += UI.section('COMPLETATI', cells);
        }
        if (sopralluoghi.length === 0) html += UI.emptyState('\uD83D\uDCCB', 'Nessun testimoniale', 'Tocca "Nuovo Testimoniale" per iniziare un sopralluogo');
        container.innerHTML = html;
        document.getElementById('btn-new-sop').addEventListener('click', async () => { const id = await Events.createSopralluogo({}); App.navigate(`setup/${id}`); });
        container.querySelectorAll('.cell[data-id]').forEach((cell) => {
            cell.addEventListener('click', () => { const id = cell.dataset.id; DB.getSopralluogo(id).then((sop) => { if (!sop) return; if (sop.phase === 1) App.navigate(`setup/${id}`); else App.navigate(`rooms/${id}`); }); });
        });
